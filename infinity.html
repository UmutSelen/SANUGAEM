<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Run - Sanu Game Company</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f0f13;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background-color: #1c1c24;
            border-bottom: 5px solid #4CAF50;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.2);
            border-radius: 10px 10px 0 0;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 800px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 19, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #4CAF50;
            text-align: center;
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.5);
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #45a049; transform: scale(1.05); }
        .back-link {
            display: block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div id="ui">
        <div>Skor: <span id="score">0</span></div>
        <div>En Yüksek: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="gameOverScreen">
        <h1 style="color: #FF5722; margin-top: 0;">OYUN BİTTİ!</h1>
        <p style="font-size: 20px;">Skorun: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Tekrar Oyna (Space)</button>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Değişkenleri
        let frames = 0;
        let score = 0;
        let highScore = localStorage.getItem("sanuHighScore") || 0;
        let gameActive = true;
        let gameSpeed = 5;

        document.getElementById("highScore").innerText = highScore;

        // Oyuncu (Küp)
        const player = {
            x: 50, y: 300, width: 40, height: 40,
            dy: 0, gravity: 0.6, jumpPower: -12, grounded: false,
            draw: function() {
                ctx.fillStyle = "#4CAF50"; // Sanu Yeşili
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#4CAF50";
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0; // Gölgeyi sıfırla
            },
            update: function() {
                this.dy += this.gravity;
                this.y += this.dy;
                
                // Yere çarpma kontrolü (Zemin 360'ta)
                if (this.y + this.height >= 400) {
                    this.y = 400 - this.height;
                    this.dy = 0;
                    this.grounded = true;
                } else {
                    this.grounded = false;
                }
            },
            jump: function() {
                if (this.grounded) {
                    this.dy = this.jumpPower;
                }
            }
        };

        // Engeller
        const obstacles = [];
        function handleObstacles() {
            if (frames % 100 === 0) { // Her 100 karede bir engel üret
                let obsHeight = Math.random() * 40 + 30; // 30 ile 70 arası boy
                obstacles.push({
                    x: canvas.width,
                    y: 400 - obsHeight,
                    width: 30,
                    height: obsHeight
                });
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;
                
                ctx.fillStyle = "#FF5722"; // Düşman rengi (Kırmızı/Turuncu)
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Çarpışma Kontrolü (AABB)
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameOver();
                }

                // Ekrandan çıkanları sil ve skor ver
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById("score").innerText = score;
                    
                    // Oyun yavaş yavaş hızlansın
                    if (score % 50 === 0) gameSpeed += 0.5;
                }
            }
        }

        // Kontroller
        window.addEventListener("keydown", function(e) {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (gameActive) player.jump();
                else resetGame(); // Oyun bittiyse space ile yeniden başlat
            }
        });
        window.addEventListener("mousedown", function() {
            if (gameActive) player.jump();
        });

        function gameOver() {
            gameActive = false;
            document.getElementById("gameOverScreen").style.display = "block";
            document.getElementById("finalScore").innerText = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("sanuHighScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        function resetGame() {
            obstacles.length = 0;
            score = 0;
            frames = 0;
            gameSpeed = 5;
            player.y = 300;
            player.dy = 0;
            document.getElementById("score").innerText = score;
            document.getElementById("gameOverScreen").style.display = "none";
            gameActive = true;
            animate();
        }

        // Oyun Döngüsü
        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Arka plandaki yıldızlar/tozlar (Hız hissi için opsiyonel eklenebilir)
            
            player.update();
            player.draw();
            handleObstacles();
            
            frames++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
