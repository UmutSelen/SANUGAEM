<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanu Candy - The Ultimate Engine</title>
    <style>
        /* ==========================================
           1. CSS TASARIM VE GÖRSEL MİMARİ
           ========================================== */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #050508; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #universeCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
        }

        #gameArea { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }

        #gameCanvas { 
            background: rgba(10, 10, 25, 0.85); 
            box-shadow: 0 0 50px rgba(255, 64, 129, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.05); 
            border: 5px solid #FF4081; 
            border-radius: 30px; 
            max-width: 95vw; 
            max-height: 75vh; 
            cursor: pointer; 
            backdrop-filter: blur(15px);
            touch-action: none; 
        }

        /* ==========================================
           2. MOBİL UYUMLU UI (SKOR & KONTROL)
           ========================================== */
        .top-ui { 
            position: absolute; 
            top: 25px; 
            width: 90%;
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            z-index: 10; 
            pointer-events: none; 
        }

        .score-board { 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
            color: #FFF; 
            border: 3px solid #FF4081; 
            padding: 10px 20px; 
            border-radius: 18px; 
            background: rgba(255, 64, 129, 0.3); 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            min-width: 120px;
        }

        .high-score-text {
            font-size: 12px;
            color: #FFD700;
            margin-bottom: 3px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .current-score-text {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .controls { 
            display: flex; 
            gap: 15px; 
            pointer-events: auto; 
        }

        .icon-btn { 
            background: rgba(255, 64, 129, 0.3); 
            border: 2px solid #FF4081; 
            color: #FFF; 
            width: 55px; 
            height: 55px; 
            border-radius: 15px; 
            font-size: 26px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            transition: 0.2s;
        }
        
        .icon-btn:active { transform: scale(0.9); }

        #comboText {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #00E5FF;
            text-shadow: 0 0 10px #00E5FF;
            opacity: 0;
            transition: 0.3s;
        }

        /* MODAL */
        #helpModal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(15, 20, 35, 0.98); border: 4px solid #FF4081; padding: 35px; border-radius: 40px; 
            z-index: 100; max-width: 85%; width: 400px; box-shadow: 0 0 100px rgba(255, 64, 129, 0.6); 
        }
        .action-btn { 
            background: linear-gradient(135deg, #FF4081, #E91E63); color: white; border: none; 
            padding: 20px; font-size: 22px; border-radius: 20px; font-weight: 900; width: 100%; margin-top: 25px;
        }
    </style>
</head>
<body>

    <canvas id="universeCanvas"></canvas>

    <div id="gameArea">
        <div class="top-ui">
            <div class="score-board">
                <div class="high-score-text">EN İYİ: <span id="highScore">0</span></div>
                <div class="current-score-text" id="scoreDisplay">0</div>
            </div>
            
            <div class="controls">
                <a href="index.html" class="icon-btn">🏠</a>
                <button class="icon-btn" id="vibBtn" onclick="toggleVibration()">📳</button>
                <button class="icon-btn" onclick="toggleHelp()">?</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="560" height="560"></canvas>
        <div id="comboText">COMBO X2</div>

        <div id="helpModal">
            <h2 style="color: #FF4081; text-align: center; margin-top: 0;">ULTIMATE ENGINE</h2>
            <p>🌟 <b>Akışkan Fizik:</b> Şekerler ağırlıkla düşer ve seker.</p>
            <p>🧶 <b>Yumak Mantığı:</b> En az 3 bitişik şekeri birleştir. Çaprazlar sayılmaz!</p>
            <p>📈 <b>Dinamik Zorluk:</b> Skorun arttıkça oranlar değişir, oyun ciddileşir.</p>
            <button class="action-btn" onclick="toggleHelp()">BAŞLAT</button>
        </div>
    </div>

    <script>
        /* ==========================================
           3. JAVASCRIPT MOTORU (EKSİKSİZ TAM SÜRÜM)
           ========================================== */

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const bgCanvas = document.getElementById('universeCanvas');
        const bgCtx = bgCanvas.getContext('2d');

        const gridSize = 8;
        const cellSize = 70;
        
        let score = 0;
        let highScore = localStorage.getItem("sanuCandy_Ultimate_High") || 0;
        let isVibrationEnabled = true;
        let gameState = "IDLE"; 
        let comboCount = 0;
        
        let grid = [];
        let particles = [];
        let selectedCandy = null;
        let isDragging = false;
        let startX, startY;

        //image_6.png'deki o efsanevi renkler ve şekiller
        const refColors = [
            { id: 0, base: "#FF1744", light: "#FF8A80", type: "spiralJelly" }, // Kırmızı Sarmal
            { id: 1, base: "#00E676", light: "#B9F6CA", type: "swirlGreen" },  // Yeşil Girdap
            { id: 2, base: "#2962FF", light: "#82B1FF", type: "jelBean" },     // Mavi Fasulye
            { id: 3, base: "#FFEA00", light: "#FFFF8D", type: "star" },        // Sarı Yıldız
            { id: 4, base: "#FF6D00", light: "#FFD180", type: "triangle" },    // Turuncu Piramit
            { id: 5, base: "#D500F9", light: "#EA80FC", type: "heart" }        // Mor Kalp
        ];

        function init() {
            document.getElementById("highScore").innerText = highScore;
            resize();
            window.addEventListener('resize', resize);
            createGrid();
            requestAnimationFrame(mainLoop);
            requestAnimationFrame(animateBg);
        }

        function resize() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            let size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7);
            canvas.style.width = size + "px";
            canvas.style.height = size + "px";
        }

        function triggerVibration(ms) {
            if (isVibrationEnabled && navigator.vibrate) navigator.vibrate(ms);
        }

        // ==========================================
        // DİNAMİK ZORLUK MOTORU
        // ==========================================
        function getSmartColor() {
            let maxColors = 4;
            if (score > 600) maxColors = 5;
            if (score > 1800) maxColors = 6;

            if (score > 3500) {
                let r = Math.random();
                if (r < 0.28) return 0; // Kırmızı %28
                if (r < 0.56) return 1; // Yeşil %28
                if (r < 0.70) return 2; // Mavi %14
                if (r < 0.84) return 3; // Sarı %14
                if (r < 0.94) return 4; // Turuncu %10
                return 5;               // Mor %6
            }
            return Math.floor(Math.random() * maxColors);
        }

        // ==========================================
        // ŞEKER SINIFI (CANDY) - DETAYLI ÇİZİM
        // ==========================================
        class Candy {
            constructor(r, c, colorIdx, special = "normal") {
                this.r = r; this.c = c;
                this.colorIdx = colorIdx;
                this.x = c * cellSize;
                this.y = r * cellSize;
                this.targetY = r * cellSize;
                this.velY = 0;
                this.gravity = 0.5;
                this.bounce = 0.3;
                this.isSpecial = special;
                this.scale = 1;
            }

            update() {
                // Akışkan Düşme Fiziği
                if (this.y < this.targetY) {
                    this.velY += this.gravity;
                    this.y += this.velY;
                    if (this.y >= this.targetY) {
                        this.y = this.targetY;
                        if (this.velY > 2.5) this.velY *= -this.bounce; // Juicy sekme
                        else this.velY = 0;
                    }
                } else if (this.y > this.targetY && gameState !== "SWAPPING") {
                    this.y -= (this.y - this.targetY) * 0.15;
                }
                if (gameState === "IDLE") this.x = this.c * cellSize;
            }

            draw(isSelected) {
                let cx = this.x + cellSize / 2;
                let cy = this.y + cellSize / 2;
                let info = refColors[this.colorIdx];
                if (!info) return;

                let time = Date.now();
                let breathe = Math.sin(time / 250 + (this.r * 0.5)) * 0.04;
                let finalScale = (this.scale + breathe) * (isSelected ? 1.3 : 1);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(finalScale, finalScale);
                
                // Neon Işıma (Sadece seçiliyken veya özelken)
                ctx.shadowBlur = isSelected ? 25 : 12;
                ctx.shadowColor = isSelected ? "white" : "rgba(0,0,0,0.5)";

                let grad = ctx.createRadialGradient(-10, -10, 2, 0, 0, 25);
                grad.addColorStop(0, info.light);
                grad.addColorStop(1, info.base);
                ctx.fillStyle = grad;

                // DETAYLI ŞEKİL ÇİZİMLERİ
                this.renderShape(info.type, 26);
                this.renderFace();

                ctx.restore();
            }

            renderShape(type, r) {
                ctx.beginPath();
                if (type === "spiralJelly") {
                    ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=3; ctx.beginPath();
                    for(let i=0; i<10; i++) { let a=0.1*i; ctx.lineTo((1+2*a)*Math.cos(a*10), (1+2*a)*Math.sin(a*10)); } ctx.stroke();
                } else if (type === "swirlGreen") {
                    ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle="white"; for(let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.fillRect(4,4,8,8); }
                } else if (type === "jelBean") {
                    ctx.ellipse(0,0,r,r*0.7,0,0,Math.PI*2);
                } else if (type === "star") {
                    for(let i=0; i<10; i++) { let rad=(i%2===0)?r:r/2.2; ctx.lineTo(Math.cos(i*Math.PI/5-Math.PI/2)*rad, Math.sin(i*Math.PI/5-Math.PI/2)*rad); }
                } else if (type === "triangle") {
                    ctx.moveTo(0,-r); ctx.lineTo(r,r); ctx.lineTo(-r,r);
                } else if (type === "heart") {
                    ctx.moveTo(0,r/1.5); ctx.bezierCurveTo(-r,-r/2,-r/2,-r,0,-r/3); ctx.bezierCurveTo(r/2,-r,r,-r/2,0,r/1.5);
                }
                ctx.closePath(); ctx.fill();
            }

            renderFace() {
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.beginPath();
                ctx.arc(-8,-4,4,0,Math.PI*2); ctx.arc(8,-4,4,0,Math.PI*2); ctx.fill(); // Gözler
                ctx.fillStyle = "white"; ctx.beginPath();
                ctx.arc(-9,-5,1.5,0,Math.PI*2); ctx.arc(7,-5,1.5,0,Math.PI*2); ctx.fill(); // Parlama
                ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth=2.5; ctx.beginPath();
                ctx.arc(0,3,7,0.3,Math.PI-0.3); ctx.stroke(); // Gülüş
            }
        }

        // ==========================================
        // IZGARA VE YUMAK ALGORİTMASI (BFS)
        // ==========================================
        function createGrid() {
            grid = [];
            for (let r = 0; r < gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < gridSize; c++) grid[r][c] = new Candy(r, c, getSmartColor());
            }
            while (checkMatches().length > 0) {
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) grid[r][c].colorIdx = getSmartColor();
                }
            }
        }

        function checkMatches() {
            let matches = [];
            let visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!visited[r][c] && grid[r][c]) {
                        let color = grid[r][c].colorIdx;
                        let group = []; let stack = [{ r, c }];
                        visited[r][c] = true;
                        while (stack.length > 0) {
                            let curr = stack.pop(); group.push(curr);
                            let neighbors = [{ r: curr.r+1, c: curr.c }, { r: curr.r-1, c: curr.c }, { r: curr.r, c: curr.c+1 }, { r: curr.r, c: curr.c-1 }];
                            for (let n of neighbors) {
                                if (n.r>=0 && n.r<gridSize && n.c>=0 && n.c<gridSize && !visited[n.r][n.c] && grid[n.r][n.c] && grid[n.r][n.c].colorIdx === color) {
                                    visited[n.r][n.c] = true; stack.push(n);
                                }
                            }
                        }
                        if (group.length >= 3) matches.push(group);
                    }
                }
            }
            return matches;
        }

        // ==========================================
        // PATLAMA VE YENİLEME MANTIĞI
        // ==========================================
        async function processBoard() {
            gameState = "PROCESSING";
            let chain = true; comboCount = 0;
            while (chain) {
                let matches = checkMatches();
                if (matches.length === 0) { chain = false; break; }
                comboCount++;
                if (comboCount > 1) {
                    let ct = document.getElementById("comboText");
                    ct.innerText = `COMBO X${comboCount}!`; ct.style.opacity = "1";
                }
                for (let group of matches) {
                    // 5 ve üzeri kuralı (şeker sayısı / 5 kadar bomba bırakır)
                    let specialPos = group[0];
                    let specialCount = Math.floor(group.length / 5);
                    if (specialCount > 5) specialCount = 5;

                    for (let pos of group) {
                        let c = grid[pos.r][pos.c];
                        if (c) {
                            createRichExplosion(c.x+cellSize/2, c.y+cellSize/2, refColors[c.colorIdx].base);
                            grid[pos.r][pos.c] = null;
                        }
                    }
                    score += group.length * 15 * comboCount;
                    updateUI(); triggerVibration(80);

                    // Eğer 5'li eşleşme varsa oraya bomba bırak (örnek olarak bir şeker döner)
                    if (specialCount > 0) {
                        grid[specialPos.r][specialPos.c] = new Candy(specialPos.r, specialPos.c, Math.floor(Math.random()*6), "bomb");
                    }
                }
                await new Promise(r => setTimeout(r, 450));
                await refillGrid();
                await new Promise(r => setTimeout(r, 700));
            }
            gameState = "IDLE";
            document.getElementById("comboText").style.opacity = "0";
        }

        function refillGrid() {
            return new Promise(resolve => {
                for (let c = 0; c < gridSize; c++) {
                    let emptySlot = gridSize - 1;
                    for (let r = gridSize - 1; r >= 0; r--) {
                        if (grid[r][c]) {
                            let candy = grid[r][c];
                            grid[emptySlot][c] = candy;
                            if (emptySlot !== r) grid[r][c] = null;
                            candy.r = emptySlot; candy.targetY = emptySlot * cellSize;
                            emptySlot--;
                        }
                    }
                    for (let r = emptySlot; r >= 0; r--) {
                        grid[r][c] = new Candy(r, c, getSmartColor());
                        grid[r][c].y = -200 - (r * cellSize); grid[r][c].targetY = r * cellSize;
                    }
                }
                resolve();
            });
        }

        function updateUI() {
            document.getElementById("scoreDisplay").innerText = score;
            if (score > highScore) {
                highScore = score; localStorage.setItem("sanuCandy_Ultimate_High", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        // ==========================================
        // PARTİKÜL SİSTEMİ (ZENGİN EFEKTLER)
        // ==========================================
        function createRichExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18, life: 1.0, color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ==========================================
        // KONTROLLER (TAP & SWIPE)
        // ==========================================
        canvas.addEventListener("pointerdown", e => {
            if (gameState !== "IDLE") return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            startX = (e.clientX - rect.left) * scale;
            startY = (e.clientY - rect.top) * scale;
            let c = Math.floor(startX / cellSize), r = Math.floor(startY / cellSize);
            if (r>=0 && r<gridSize && c>=0 && c<gridSize) {
                isDragging = true;
                if (!selectedCandy) { selectedCandy = { r, c }; triggerVibration(30); }
                else {
                    if (Math.abs(selectedCandy.r - r) + Math.abs(selectedCandy.c - c) === 1) {
                        handleSwap(selectedCandy.r, selectedCandy.c, r, c);
                        selectedCandy = null;
                    } else selectedCandy = { r, c };
                }
            }
        });

        canvas.addEventListener("pointermove", e => {
            if (!isDragging || gameState !== "IDLE" || !selectedCandy) return;
            const rect = canvas.getBoundingClientRect(); const scale = canvas.width / rect.width;
            let dx = (e.clientX - rect.left) * scale - startX, dy = (e.clientY - rect.top) * scale - startY;
            if (Math.abs(dx) > cellSize * 0.4 || Math.abs(dy) > cellSize * 0.4) {
                isDragging = false;
                let tr = selectedCandy.r, tc = selectedCandy.c;
                if (Math.abs(dx) > Math.abs(dy)) tc += (dx > 0 ? 1 : -1);
                else tr += (dy > 0 ? 1 : -1);
                if (tr>=0 && tr<gridSize && tc>=0 && tc<gridSize) handleSwap(selectedCandy.r, selectedCandy.c, tr, tc);
                selectedCandy = null;
            }
        });

        function handleSwap(r1, c1, r2, c2) {
            gameState = "SWAPPING";
            let c1_obj = grid[r1][c1], c2_obj = grid[r2][c2];
            grid[r1][c1] = c2_obj; grid[r2][c2] = c1_obj;
            c1_obj.r = r2; c1_obj.c = c2; c1_obj.targetY = r2 * cellSize;
            c2_obj.r = r1; c2_obj.c = c1; c2_obj.targetY = r1 * cellSize;
            setTimeout(() => {
                if (checkMatches().length > 0) processBoard();
                else {
                    gameState = "REVERTING"; triggerVibration(50);
                    grid[r1][c1] = c1_obj; grid[r2][c2] = c2_obj;
                    c1_obj.r = r1; c1_obj.targetY = r1 * cellSize;
                    c2_obj.r = r2; c2_obj.targetY = r2 * cellSize;
                    setTimeout(() => gameState = "IDLE", 300);
                }
            }, 350);
        }

        // ==========================================
        // ANA DÖNGÜ VE ARKAPLAN
        // ==========================================
        function mainLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.12)";
                    ctx.fillRect(c*cellSize+3, r*cellSize+3, cellSize-6, cellSize-6);
                    if (grid[r][c]) { grid[r][c].update(); grid[r][c].draw(selectedCandy && selectedCandy.r===r && selectedCandy.c===c); }
                }
            }
            updateParticles(); requestAnimationFrame(mainLoop);
        }

        function animateBg() {
            bgCtx.fillStyle = "#0f2027"; bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
            requestAnimationFrame(animateBg);
        }

        function toggleHelp() { document.getElementById("helpModal").style.display = (document.getElementById("helpModal").style.display === "block" ? "none" : "block"); }
        function toggleVibration() { isVibrationEnabled = !isVibrationEnabled; triggerVibration(60); }
        init();
    </script>
</body>
</html>
