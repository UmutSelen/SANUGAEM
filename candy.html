<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Match 3 - Efsanevi Sürüm</title>
    <style>
        /* TEMEL AYARLAR */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #08080a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; /* Mobilde sayfayı kaydırmayı engeller */
        }
        
        /* CANLI ARKA PLAN */
        #universeCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
        }
        
        #gameArea { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* OYUN TAHTASI (Puslu Cam Efekti) */
        #gameCanvas { 
            background: rgba(20, 20, 30, 0.6); 
            box-shadow: 0 0 50px rgba(255, 64, 129, 0.5); 
            border: 5px solid #FF4081; 
            border-radius: 25px; 
            max-width: 95vmin; 
            max-height: 95vmin; 
            cursor: pointer; 
            backdrop-filter: blur(10px); 
            touch-action: none; 
        }
        
        /* ÜST ARAYÜZ VE BUTONLAR */
        .top-ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            right: 20px; 
            display: flex; 
            justify-content: space-between; 
            z-index: 10; 
            pointer-events: none; 
        }
        
        .score-board { 
            font-size: 28px; 
            font-weight: bold; 
            text-shadow: 3px 3px 0px rgba(0,0,0,0.8); 
            pointer-events: auto; 
            color: #FFF; 
            border: 3px solid #FF4081; 
            padding: 5px 20px; 
            border-radius: 15px; 
            background: rgba(255, 64, 129, 0.2); 
            backdrop-filter: blur(5px); 
        }
        
        .controls { 
            display: flex; 
            gap: 15px; 
            pointer-events: auto; 
        }
        
        .icon-btn { 
            background: rgba(255, 64, 129, 0.2); 
            border: 2px solid #FF4081; 
            color: #FFF; 
            width: 50px; 
            height: 50px; 
            border-radius: 15px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            backdrop-filter: blur(5px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
        }
        
        .icon-btn:hover { 
            background: #FF4081; 
            transform: scale(1.1); 
            box-shadow: 0 0 15px #FF4081; 
        }

        /* MODALLAR (Bilgi Ekranı) */
        #helpModal { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(20, 20, 30, 0.95); 
            border: 4px solid #FF4081; 
            padding: 30px; 
            border-radius: 25px; 
            text-align: left; 
            z-index: 100; 
            max-width: 80%; 
            width: 380px; 
            box-shadow: 0 0 30px #FF4081; 
        }
        
        button.action-btn { 
            background: #FF4081; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold; 
            transition: 0.2s; 
            width: 100%; 
            text-align: center;
        }
        
        button.action-btn:hover { 
            background: #E91E63; 
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

    <canvas id="universeCanvas"></canvas>

    <div id="gameArea">
        <div class="top-ui">
            <div class="score-board">Tatlı Skor: <span id="score">0</span></div>
            <div class="controls">
                <a href="index.html" class="icon-btn">🏠</a>
                <button class="icon-btn" id="vibBtn" onclick="toggleVibration()">📳</button>
                <button class="icon-btn" onclick="toggleHelp()">?</button>
                <button class="icon-btn" onclick="toggleFullScreen()">⛶</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="560" height="560"></canvas>

        <div id="helpModal">
            <h2 style="color: #FF4081; text-align: center; margin-top: 0;">NASIL OYNANIR?</h2>
            <p>👆 <strong>Kaydır:</strong> Şekerleri parmağınla tut ve yana kaydır.</p>
            <p>💥 <strong>4'lü Eşleşme:</strong> Çevresini patlatan <b>Bomba Şeker</b> oluşturur!</p>
            <p>🌈 <strong>5'li Eşleşme:</strong> O renkteki tüm şekerleri patlatan <b>Gökkuşağı Şekeri</b> oluşturur!</p>
            <p>🛑 Hatalı hamle yaparsan şekerler geri seker!</p>
            <button class="action-btn" onclick="toggleHelp()">Anladım, Patlat!</button>
        </div>
    </div>

    <script>
        // --- TİTREŞİM SİSTEMİ ---
        let isVibrationEnabled = true;

        function triggerVibration(duration) {
            if (isVibrationEnabled && navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function toggleVibration() {
            isVibrationEnabled = !isVibrationEnabled;
            const btn = document.getElementById("vibBtn");
            if(isVibrationEnabled) {
                btn.innerText = "📳";
                btn.style.color = "#FFF";
                btn.style.borderColor = "#FF4081";
                triggerVibration(50);
            } else {
                btn.innerText = "📴";
                btn.style.color = "#888";
                btn.style.borderColor = "#888";
            }
        }

        // --- 1. CANLI ARKA PLAN (UZAY) ---
        const bgCanvas = document.getElementById('universeCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        function resizeBg() { 
            bgCanvas.width = window.innerWidth; 
            bgCanvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeBg); 
        resizeBg();

        const hour = new Date().getHours();
        let sky1, sky2;
        
        if (hour >= 6 && hour < 10) { sky1 = "#FF7E5F"; sky2 = "#FEB47B"; } // Sabah
        else if (hour >= 10 && hour < 17) { sky1 = "#4CA1AF"; sky2 = "#C4E0E5"; } // Öğle
        else if (hour >= 17 && hour < 20) { sky1 = "#2c3e50"; sky2 = "#fd746c"; } // Akşam
        else { sky1 = "#0f2027"; sky2 = "#203a43"; } // Gece

        const stars = [], meteors = [], shootingStars = [];
        if (hour >= 18 || hour < 6) { 
            for(let i=0; i<100; i++) stars.push({x:Math.random()*2000, y:Math.random()*1000, s:Math.random()*2+1, a:Math.random()}); 
        }

        function drawPixel(ctx, x, y, w, h, color) { 
            ctx.fillStyle = color; 
            ctx.fillRect(Math.floor(x), Math.floor(y), w, h); 
        }

        function animateBg() {
            let grd = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
            grd.addColorStop(0, sky1); 
            grd.addColorStop(1, sky2);
            bgCtx.fillStyle = grd; 
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            const cx = bgCanvas.width - 100;
            const cy = 80;
            
            if (hour >= 6 && hour < 17) {
                drawPixel(bgCtx, cx-20, cy-30, 40, 60, "#FFD700"); 
                drawPixel(bgCtx, cx-30, cy-20, 60, 40, "#FFD700");
            } else {
                drawPixel(bgCtx, cx-20, cy-40, 40, 80, "#DDDDDD"); 
                drawPixel(bgCtx, cx-10, cy-30, 40, 60, sky1); 
            }

            stars.forEach(s => { 
                s.a += 0.05; 
                bgCtx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(s.a))})`; 
                bgCtx.fillRect(s.x, s.y, s.s, s.s); 
            });

            if (Math.random() < 0.02) shootingStars.push({x: Math.random()*bgCanvas.width, y: 0, l: 30, sx: -8, sy: 8});
            
            shootingStars.forEach((ss, i) => {
                bgCtx.beginPath(); 
                bgCtx.moveTo(ss.x, ss.y); 
                bgCtx.lineTo(ss.x-ss.l, ss.y+ss.l); 
                bgCtx.strokeStyle="white"; 
                bgCtx.stroke();
                ss.x += ss.sx; ss.y += ss.sy; 
                if(ss.y > bgCanvas.height) shootingStars.splice(i,1);
            });

            if (Math.random() < 0.01) meteors.push({x: Math.random()*bgCanvas.width, y: -50, size: 5, sx: -2, sy: 4});
            
            meteors.forEach((m, i) => {
                drawPixel(bgCtx, m.x+5, m.y-10, m.size, m.size, "rgba(255,69,0,0.5)"); 
                drawPixel(bgCtx, m.x, m.y, m.size, m.size, "#8B4513");
                m.x += m.sx; m.y += m.sy; 
                if(m.y > bgCanvas.height) meteors.splice(i,1);
            });
            
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- 2. CANDY MATCH 3 (ŞEKERLER VE OYUN MOTORU) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        function resizeGame() {
            let size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.75);
            canvas.style.width = size + "px"; 
            canvas.style.height = size + "px";
        }
        window.addEventListener('resize', resizeGame); 
        resizeGame();

        const gridSize = 8;
        const cellSize = 70;
        let score = 0;
        let grid = [];
        let particles = [];
        
        // Animasyon ve Oyun Durumları
        let gameState = "IDLE"; // IDLE, SWAPPING, REVERTING, DROPPING
        let animOffset = 0; 
        let swapData = null; // {r1, c1, r2, c2, candy1, candy2}

        // Renkler ve Şekil İsimleri
        const colors = [
            { base: "#FF1744", light: "#FF8A80", type: "circle" }, 
            { base: "#00E5FF", light: "#84FFFF", type: "flower" }, 
            { base: "#FFEA00", light: "#FFFF8D", type: "triangle" },
            { base: "#00E676", light: "#B9F6CA", type: "square" }, 
            { base: "#D500F9", light: "#EA80FC", type: "circle" }, 
            { base: "#212121", light: "#757575", type: "colorBomb" } // Gökkuşağı (Index 5)
        ];

        // GÜVENLİ ÇİZİM FONKSİYONU: Hata vermeyen yuvarlak köşe çizici
        function drawSafeRoundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ŞEKER SINIFI
        class Candy {
            constructor(r, c, colorIdx, isSpecial = "normal") {
                this.r = r; 
                this.c = c;
                this.x = c * cellSize; 
                this.y = r * cellSize;
                this.colorIdx = colorIdx;
                this.isSpecial = isSpecial; // "normal", "bomb", "colorBomb"
            }
            
            updatePos() {
                // Eğer oyun bekliyorsa (animasyon yoksa) şekeri tam yuvaya oturt
                if(gameState === "IDLE") { 
                    this.x = this.c * cellSize; 
                    this.y = this.r * cellSize; 
                }
            }
            
            draw(isSelected) {
                let px = this.x + cellSize/2; 
                let py = this.y + cellSize/2; 
                let r = 24;
                let cInfo = colors[this.colorIdx];
                
                ctx.save(); 
                ctx.translate(px, py);
                
                // Canlılık: Şekerlerin nefes alma animasyonu
                let time = Date.now();
                let scale = 1 + Math.sin((time/200) + this.c + this.r) * 0.05;
                if(isSelected) scale = 1.2; // Tıklanan şeker şişer
                ctx.scale(scale, scale);

                // Bomba Şekeri için Dış Parlama
                if(this.isSpecial === "bomb") {
                    ctx.shadowBlur = 15 + Math.sin(time/100)*5; 
                    ctx.shadowColor = "#FFF";
                    ctx.beginPath(); 
                    ctx.arc(0, 0, r+6, 0, Math.PI*2); 
                    ctx.fillStyle = "rgba(255,255,255,0.5)"; 
                    ctx.fill();
                    ctx.shadowBlur = 0; // Kapat
                }

                // Şekil Çizimi
                if(this.isSpecial === "colorBomb") {
                    // Gökkuşağı Şekeri (Siyah gövde, renkli noktalar)
                    let grd = ctx.createRadialGradient(-r/3, -r/3, 2, 0, 0, r);
                    grd.addColorStop(0, "#757575"); 
                    grd.addColorStop(1, "#212121");
                    ctx.fillStyle = grd; 
                    ctx.beginPath(); 
                    ctx.arc(0, 0, r, 0, Math.PI*2); 
                    ctx.fill();
                    
                    // Renkli Noktalar
                    for(let i=0; i<6; i++) {
                        let angle = (i * Math.PI / 3) + time/1000;
                        ctx.fillStyle = colors[i%5].base;
                        ctx.beginPath(); 
                        ctx.arc(Math.cos(angle)*12, Math.sin(angle)*12, 4, 0, Math.PI*2); 
                        ctx.fill();
                    }
                } else {
                    // Normal ve Bomba Şekerlerin Renk Geçişi
                    let grd = ctx.createRadialGradient(-r/3, -r/3, 2, 0, 0, r);
                    grd.addColorStop(0, cInfo.light); 
                    grd.addColorStop(1, cInfo.base);
                    ctx.fillStyle = grd;

                    // Şekiller (Tarayıcı çöktürmeyen güvenli çizimler)
                    if(cInfo.type === "circle") { 
                        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill(); 
                    }
                    else if(cInfo.type === "square") { 
                        drawSafeRoundRect(ctx, -r, -r, r*2, r*2, 10); ctx.fill(); 
                    }
                    else if(cInfo.type === "triangle") { 
                        ctx.beginPath(); ctx.moveTo(0, -r-5); ctx.lineTo(r, r); ctx.lineTo(-r, r); ctx.closePath(); ctx.fill(); 
                    }
                    else if(cInfo.type === "flower") {
                        ctx.beginPath(); ctx.arc(0, -8, 12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(0, 8, 12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(-8, 0, 12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(8, 0, 12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); // Merkez
                    }

                    // Yüz İfadesi Çizimi
                    ctx.fillStyle = "#2c3e50"; 
                    ctx.beginPath(); ctx.arc(-6, -2, 3, 0, Math.PI*2); ctx.fill(); 
                    ctx.beginPath(); ctx.arc(6, -2, 3, 0, Math.PI*2); ctx.fill();
                    
                    ctx.fillStyle = "white"; 
                    ctx.beginPath(); ctx.arc(-7, -3, 1.5, 0, Math.PI*2); ctx.fill(); 
                    ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI*2); ctx.fill();
                    
                    if(this.isSpecial === "bomb") {
                        // Bomba Surat: Düz çizgi (Kararlı)
                        ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 2; 
                        ctx.beginPath(); ctx.moveTo(-4, 4); ctx.lineTo(4, 4); ctx.stroke();
                    } else {
                        // Normal Surat: Gülümseme
                        ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 2; 
                        ctx.beginPath(); ctx.arc(0, 4, 5, 0.2, Math.PI-0.2); ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }

        // --- BAŞLANGIÇ IZGARASINI OLUŞTURMA ---
        function createGrid() { 
            for (let r=0; r<gridSize; r++) { 
                grid[r] = []; 
                for (let c=0; c<gridSize; c++) {
                    grid[r][c] = new Candy(r, c, Math.floor(Math.random()*5)); 
                }
            } 
            // Başlangıçta eşleşme olmasın diye temizle
            while(checkMatches().length > 0) {
                for (let r=0; r<gridSize; r++) { 
                    for (let c=0; c<gridSize; c++) {
                        grid[r][c].colorIdx = Math.floor(Math.random()*5);
                    }
                }
            }
        }

        // --- ANA OYUN ÇİZİM VE ANİMASYON DÖNGÜSÜ ---
        function animateGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Arkadaki Slotlar
            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    ctx.fillStyle = (r+c)%2===0 ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.15)";
                    drawSafeRoundRect(ctx, c*cellSize+2, r*cellSize+2, cellSize-4, cellSize-4, 10);
                    ctx.fill();
                }
            }

            // SWAP (KAYDIRMA) ve REVERT (GERİ SEKME) ANİMASYONU
            if(gameState === "SWAPPING" || gameState === "REVERTING") {
                animOffset += 0.15; // Kaydırma hızı
                if(animOffset >= 1) {
                    animOffset = 0;
                    if(gameState === "SWAPPING") {
                        if(checkMatches().length > 0) {
                            gameState = "DROPPING"; 
                            solveMatches();
                        } else {
                            // EŞLEŞME YOK! Geri Sekme Animasyonunu Başlat
                            gameState = "REVERTING";
                            triggerVibration(50); // Hatalı hamle titremesi
                            
                            // Grid'deki yerleri tekrar geri al
                            let temp = grid[swapData.r1][swapData.c1];
                            grid[swapData.r1][swapData.c1] = grid[swapData.r2][swapData.c2];
                            grid[swapData.r2][swapData.c2] = temp;
                            
                            grid[swapData.r1][swapData.c1].r = swapData.r1; grid[swapData.r1][swapData.c1].c = swapData.c1;
                            grid[swapData.r2][swapData.c2].r = swapData.r2; grid[swapData.r2][swapData.c2].c = swapData.c2;
                        }
                    } else if(gameState === "REVERTING") {
                        // Geri sekme bitti, oynamaya devam
                        gameState = "IDLE";
                        swapData = null;
                    }
                } else {
                    // Şekerlerin kayarkenki koordinatlarını güncelle (Lerp)
                    let c1 = swapData.candy1; 
                    let c2 = swapData.candy2;
                    
                    let targetX1 = c1.c * cellSize; let targetY1 = c1.r * cellSize;
                    let targetX2 = c2.c * cellSize; let targetY2 = c2.r * cellSize;
                    
                    if(gameState === "REVERTING") {
                        targetX1 = swapData.c1 * cellSize; targetY1 = swapData.r1 * cellSize;
                        targetX2 = swapData.c2 * cellSize; targetY2 = swapData.r2 * cellSize;
                    }

                    c1.x += (targetX1 - c1.x) * 0.3; 
                    c1.y += (targetY1 - c1.y) * 0.3;
                    c2.x += (targetX2 - c2.x) * 0.3; 
                    c2.y += (targetY2 - c2.y) * 0.3;
                }
            }

            // Şekerleri Çiz
            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    if (grid[r][c]) {
                        grid[r][c].updatePos();
                        let selected = (firstClick && firstClick.r === r && firstClick.c === c);
                        grid[r][c].draw(selected);
                    }
                }
            }

            // Patlama Parçacıkları Çizimi
            for(let i=0; i<particles.length; i++) {
                let p = particles[i]; 
                p.x += p.vx; 
                p.y += p.vy; 
                p.life -= 0.03;
                
                ctx.globalAlpha = Math.max(0, p.life); 
                ctx.fillStyle = p.color;
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); 
                ctx.fill(); 
                ctx.globalAlpha = 1;
                
                if(p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateGame);
        }

        // --- PATLAMA VE OYUN MANTIĞI ---
        function createExplosion(c, r, colorIdx, isBig = false) {
            let px = c * cellSize + cellSize/2; 
            let py = r * cellSize + cellSize/2;
            let count = isBig ? 30 : 12; 
            let speed = isBig ? 25 : 15;
            let particleColor = colorIdx === 5 ? "#FFF" : colors[colorIdx].base;
            
            for(let i=0; i<count; i++) { 
                particles.push({ 
                    x: px, y: py, 
                    vx: (Math.random()-0.5)*speed, 
                    vy: (Math.random()-0.5)*speed, 
                    life: 1, 
                    size: Math.random()*6+3, 
                    color: particleColor 
                }); 
            }
        }

        function checkMatches() { 
            let matchGroups = [];

            // Yatay Kontrol
            for(let r=0; r<gridSize; r++) {
                let matchLen = 1;
                for(let c=0; c<gridSize; c++) {
                    let check = false;
                    if(c < gridSize-1 && grid[r][c] && grid[r][c+1] && grid[r][c].colorIdx === grid[r][c+1].colorIdx && grid[r][c].isSpecial !== "colorBomb") {
                        matchLen++; check = true;
                    }
                    if(!check || c === gridSize-2) {
                        if(matchLen >= 3) {
                            let group = [];
                            for(let i=0; i<matchLen; i++) { group.push({r: r, c: c - (check ? matchLen-2 : matchLen-1) + i}); }
                            matchGroups.push(group);
                        }
                        matchLen = 1;
                    }
                }
            }

            // Dikey Kontrol
            for(let c=0; c<gridSize; c++) {
                let matchLen = 1;
                for(let r=0; r<gridSize; r++) {
                    let check = false;
                    if(r < gridSize-1 && grid[r][c] && grid[r+1][c] && grid[r][c].colorIdx === grid[r+1][c].colorIdx && grid[r][c].isSpecial !== "colorBomb") {
                        matchLen++; check = true;
                    }
                    if(!check || r === gridSize-2) {
                        if(matchLen >= 3) {
                            let group = [];
                            for(let i=0; i<matchLen; i++) { group.push({r: r - (check ? matchLen-2 : matchLen-1) + i, c: c}); }
                            matchGroups.push(group);
                        }
                        matchLen = 1;
                    }
                }
            }
            return matchGroups; 
        }

        function dropCandies() { 
            for(let c=0; c<gridSize; c++) { 
                let k=gridSize-1; 
                for(let r=gridSize-1; r>=0; r--) {
                    if(grid[r][c] !== null) { 
                        grid[k][c] = grid[r][c]; 
                        grid[k][c].r = k; 
                        k--; 
                    } 
                }
                // Boşluklara ekranın üstünden yeni şeker düşür
                for(let r=k; r>=0; r--) {
                    grid[r][c] = new Candy(r, c, Math.floor(Math.random()*5));
                    grid[r][c].y = -cellSize; 
                } 
            } 
        }

        async function solveMatches() {
            let matchGroups;
            while((matchGroups = checkMatches()).length > 0) {
                let toDestroy = new Set();
                let newSpecials = []; 

                matchGroups.forEach(group => {
                    let isMatch4 = group.length === 4;
                    let isMatch5 = group.length >= 5;
                    let specialCreated = false;

                    group.forEach(item => {
                        let candy = grid[item.r][item.c];
                        if(candy) {
                            toDestroy.add(`${item.r},${item.c}`);
                            
                            let isSwapOrigin = (swapData && ((item.r === swapData.r1 && item.c === swapData.c1) || (item.r === swapData.r2 && item.c === swapData.c2)));
                            
                            // Yeni özel şekerleri belirle
                            if(!specialCreated && (isSwapOrigin || (!swapData && item === group[0]))) {
                                if(isMatch5) { newSpecials.push({r: item.r, c: item.c, type: "colorBomb", color: 5}); specialCreated = true; }
                                else if(isMatch4) { newSpecials.push({r: item.r, c: item.c, type: "bomb", color: candy.colorIdx}); specialCreated = true; }
                            }

                            // Patlayan bomba ise, etrafını da ekle
                            if(candy.isSpecial === "bomb") {
                                for(let br = -1; br <= 1; br++) {
                                    for(let bc = -1; bc <= 1; bc++) {
                                        if(item.r+br >= 0 && item.r+br < gridSize && item.c+bc >= 0 && item.c+bc < gridSize) {
                                            toDestroy.add(`${item.r+br},${item.c+bc}`);
                                        }
                                    }
                                }
                                triggerVibration(300); // Bomba patlama titreşimi
                            }
                        }
                    });
                });

                // Belirlenen alanları patlat
                let destroyedCount = 0;
                Array.from(toDestroy).forEach(coord => {
                    let [r, c] = coord.split(',').map(Number);
                    if(grid[r][c]) {
                        createExplosion(c, r, grid[r][c].colorIdx, grid[r][c].isSpecial === "bomb");
                        grid[r][c] = null;
                        destroyedCount++;
                    }
                });

                score += destroyedCount * 10;
                document.getElementById("score").innerText = score;
                triggerVibration(150); 

                // Yeni Özel Şekerleri Yerleştir
                newSpecials.forEach(spec => {
                    grid[spec.r][spec.c] = new Candy(spec.r, spec.c, spec.color, spec.type);
                });

                await new Promise(res => setTimeout(res, 350));
                dropCandies();
                await new Promise(res => setTimeout(res, 350));
            }
            gameState = "IDLE";
            swapData = null;
        }

        // 5'Lİ GÖKKUŞAĞI ŞEKERİ PATLAMA MANTIĞI
        async function triggerColorBomb(bombR, bombC, targetColorIdx) {
            gameState = "DROPPING";
            triggerVibration(400); 
            createExplosion(bombC, bombR, 5, true);
            grid[bombR][bombC] = null;

            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    if(grid[r][c] && grid[r][c].colorIdx === targetColorIdx) {
                        createExplosion(c, r, targetColorIdx);
                        grid[r][c] = null;
                        score += 20;
                    }
                }
            }
            document.getElementById("score").innerText = score;
            await new Promise(res => setTimeout(res, 300));
            dropCandies();
            await new Promise(res => setTimeout(res, 300));
            solveMatches(); 
        }

        // --- KONTROLLER (SÜRÜKLE / SWIPE) ---
        let startX = 0, startY = 0, isDragging = false;
        let firstClick = null;

        canvas.addEventListener("pointerdown", e => { 
            if(gameState !== "IDLE") return; 
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height;
            
            startX = (e.clientX - rect.left) * scaleX; 
            startY = (e.clientY - rect.top) * scaleY;
            isDragging = true;

            const c = Math.floor(startX / cellSize); 
            const r = Math.floor(startY / cellSize); 
            firstClick = {r, c}; 
        });

        canvas.addEventListener("pointermove", e => {
            if(!isDragging || gameState !== "IDLE" || !firstClick) return;
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width; 
            const scaleY = canvas.height / rect.height;
            
            let currentX = (e.clientX - rect.left) * scaleX;
            let currentY = (e.clientY - rect.top) * scaleY;

            let diffX = currentX - startX;
            let diffY = currentY - startY;

            // Kaydırma (Swipe) Hassasiyeti
            if(Math.abs(diffX) > cellSize/3 || Math.abs(diffY) > cellSize/3) {
                isDragging = false;
                
                let targetR = firstClick.r;
                let targetC = firstClick.c;

                // Yön bulma
                if(Math.abs(diffX) > Math.abs(diffY)) {
                    targetC += diffX > 0 ? 1 : -1; 
                } else {
                    targetR += diffY > 0 ? 1 : -1; 
                }

                // Hedef geçerli ise değişimi başlat
                if(targetR >= 0 && targetR < gridSize && targetC >= 0 && targetC < gridSize) {
                    initiateSwap(firstClick.r, firstClick.c, targetR, targetC);
                }
                firstClick = null;
            }
        });

        canvas.addEventListener("pointerup", e => {
            if(isDragging && firstClick && gameState === "IDLE") {
                const rect = canvas.getBoundingClientRect(); 
                const scaleX = canvas.width / rect.width; 
                const scaleY = canvas.height / rect.height;
                const c = Math.floor(((e.clientX - rect.left) * scaleX) / cellSize); 
                const r = Math.floor(((e.clientY - rect.top) * scaleY) / cellSize);

                if(firstClick.r !== r || firstClick.c !== c) {
                    if(Math.abs(firstClick.r - r) + Math.abs(firstClick.c - c) === 1) {
                        initiateSwap(firstClick.r, firstClick.c, r, c);
                    }
                    firstClick = null;
                }
            }
            isDragging = false;
        });

        function initiateSwap(r1, c1, r2, c2) {
            let candy1 = grid[r1][c1]; 
            let candy2 = grid[r2][c2];
            
            if(candy1.isSpecial === "colorBomb" || candy2.isSpecial === "colorBomb") {
                let bombCandy = candy1.isSpecial === "colorBomb" ? candy1 : candy2;
                let targetCandy = candy1.isSpecial === "colorBomb" ? candy2 : candy1;
                triggerColorBomb(bombCandy.r, bombCandy.c, targetCandy.colorIdx);
                firstClick = null;
                return;
            }

            gameState = "SWAPPING";
            animOffset = 0;
            swapData = {r1, c1, r2, c2, candy1, candy2};

            grid[r1][c1] = candy2; 
            grid[r2][c2] = candy1;
            candy1.r = r2; candy1.c = c2;
            candy2.r = r1; candy2.c = c1;
        }

        // --- ARAYÜZ ---
        function toggleFullScreen() { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.log(err)); 
            else document.exitFullscreen(); 
        }
        function toggleHelp() { 
            const modal = document.getElementById("helpModal"); 
            modal.style.display = modal.style.display === "block" ? "none" : "block"; 
        }

        // Başlat
        createGrid(); 
        animateGame();
    </script>
