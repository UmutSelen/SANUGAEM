<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanu Candy - Mobil Özel Sürüm</title>
    <style>
        /* ==========================================================================
           1. MOBİL ÖNCELİKLİ CSS TASARIMI
           ========================================================================== */
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #050508; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Arka Plan */
        #universeCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
        }

        /* Oyun Alanı - Mobilde tam ekran uyumu */
        #gameArea { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }

        /* Kanvas - Performans için shadow azaltıldı, blur optimize edildi */
        #gameCanvas { 
            background: rgba(10, 10, 25, 0.8); 
            box-shadow: 0 0 30px rgba(255, 64, 129, 0.3); 
            border: 4px solid #FF4081; 
            border-radius: 20px; 
            max-width: 95vw; 
            max-height: 70vh; /* Skor ve butonlar için yer kalsın */
            cursor: pointer; 
            touch-action: none; 
        }

        /* ==========================================================================
           2. MOBİL UI - PARMAK ÖLÇEKLİ BUTONLAR
           ========================================================================== */
        
        .top-ui { 
            position: absolute; 
            top: 20px; 
            width: 90%;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 10; 
            pointer-events: none; 
        }

        .score-board { 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
            color: #FFF; 
            border: 2px solid #FF4081; 
            padding: 8px 15px; 
            border-radius: 15px; 
            background: rgba(255, 64, 129, 0.2); 
            backdrop-filter: blur(5px);
            min-width: 100px;
        }

        .high-score-text {
            font-size: 11px;
            color: #FFD700;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .current-score-text {
            font-size: 22px;
            font-weight: 900;
        }

        .controls { 
            display: flex; 
            gap: 10px; 
            pointer-events: auto; 
        }

        .icon-btn { 
            background: rgba(255, 64, 129, 0.3); 
            border: 2px solid #FF4081; 
            color: #FFF; 
            width: 50px; 
            height: 50px; 
            border-radius: 12px; 
            font-size: 24px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
        }

        /* Mobil Alt Bar */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        #comboValue {
            font-size: 18px;
            font-weight: bold;
            color: #00E5FF;
            text-shadow: 0 0 10px #00E5FF;
            opacity: 0;
            transition: 0.3s;
        }

        /* ==========================================================================
           3. MODAL SİSTEMİ
           ========================================================================== */
        
        #helpModal { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(10, 15, 30, 0.98); 
            border: 4px solid #FF4081; 
            padding: 25px; 
            border-radius: 30px; 
            z-index: 100; 
            max-width: 85%; 
            width: 350px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #helpModal h2 { color: #FF4081; text-align: center; margin-top: 0; }
        #helpModal p { font-size: 14px; line-height: 1.5; color: #ccc; }

        .action-btn { 
            background: linear-gradient(135deg, #FF4081, #E91E63);
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 18px; 
            border-radius: 15px; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <canvas id="universeCanvas"></canvas>

    <div id="gameArea">
        <div class="top-ui">
            <div class="score-board">
                <div class="high-score-text">EN İYİ: <span id="highScore">0</span></div>
                <div class="current-score-text" id="scoreDisplay">0</div>
            </div>
            
            <div class="controls">
                <a href="index.html" class="icon-btn">🏠</a>
                <button class="icon-btn" onclick="toggleVibration()">📳</button>
                <button class="icon-btn" onclick="toggleHelp()">?</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="560" height="560"></canvas>
        
        <div class="bottom-bar">
            <div id="comboValue">COMBO X2</div>
        </div>

        <div id="helpModal">
            <h2>SANU CANDY MOBILE</h2>
            <p>🌟 <b>Performans:</b> Telefon için optimize edildi. Kasmadan oynayabilirsin.</p>
            <p>🧶 <b>Eşleşme:</b> Sadece yanındaki şekerleri (dikey/yatay) kaydır veya tıkla.</p>
            <p>💣 <b>Yumak:</b> 3 ve üzeri birleşen şekerler patlar. 5 ve üzeri patlamalar bonus verir.</p>
            <button class="action-btn" onclick="toggleHelp()">BAŞLAT</button>
        </div>
    </div>

    <script>
        /* ==========================================================================
           4. JAVASCRIPT MOTORU - MOBİL OPTİMİZE
           ========================================================================== */

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false }); // Performans için alpha false
        const bgCanvas = document.getElementById('universeCanvas');
        const bgCtx = bgCanvas.getContext('2d');

        const gridSize = 8;
        const cellSize = 70;
        
        let score = 0;
        let highScore = localStorage.getItem("sanuCandy_Mobile_Best") || 0;
        let isVibrationEnabled = true;
        let gameState = "IDLE"; 
        let comboMultiplier = 1;
        
        let grid = [];
        let particles = [];
        let selectedCandy = null;
        let isDragging = false;
        let startX, startY;

        const refColors = [
            { id: 0, base: "#FF1744", light: "#FF8A80", type: "circle" }, 
            { id: 1, base: "#00E676", light: "#B9F6CA", type: "circle" },  
            { id: 2, base: "#2962FF", light: "#82B1FF", type: "circle" },     
            { base: "#FFEA00", light: "#FFFF8D", type: "circle" },        
            { base: "#FF6D00", light: "#FFD180", type: "circle" },    
            { base: "#D500F9", light: "#EA80FC", type: "circle" }        
        ];

        // --- SİSTEM ---
        function init() {
            document.getElementById("highScore").innerText = highScore;
            handleResize();
            window.addEventListener('resize', handleResize);
            createGrid();
            requestAnimationFrame(mainLoop);
            requestAnimationFrame(animateBg);
        }

        function handleResize() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            let size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.65);
            canvas.style.width = size + "px";
            canvas.style.height = size + "px";
        }

        function triggerVibration(duration) {
            if (isVibrationEnabled && navigator.vibrate) navigator.vibrate(duration);
        }

        // --- DINAMIK ZORLUK ---
        function getSmartColor() {
            let max = score > 1500 ? 6 : (score > 500 ? 5 : 4);
            if (score > 3000) {
                let r = Math.random();
                if (r < 0.3) return 0; // Kırmızı ağırlıklı, eşleşmeyi zorlaştır
                if (r < 0.5) return 1; // Yeşil ağırlıklı
            }
            return Math.floor(Math.random() * max);
        }

        // ==========================================
        // ŞEKER SINIFI - PERFORMANS ODAKLI ÇİZİM
        // ==========================================
        class Candy {
            constructor(r, c, colorIdx) {
                this.r = r; this.c = c;
                this.colorIdx = colorIdx;
                this.x = c * cellSize;
                this.y = r * cellSize;
                this.targetY = r * cellSize;
                this.velY = 0;
                this.gravity = 0.6;
                this.scale = 1;
            }

            update() {
                if (this.y < this.targetY) {
                    this.velY += this.gravity;
                    this.y += this.velY;
                    if (this.y >= this.targetY) {
                        this.y = this.targetY;
                        this.velY = 0;
                    }
                } else if (this.y > this.targetY && gameState !== "SWAPPING") {
                    this.y -= (this.y - this.targetY) * 0.2;
                }
                if (gameState === "IDLE") this.x = this.c * cellSize;
            }

            draw(isSelected) {
                let cx = this.x + cellSize / 2;
                let cy = this.y + cellSize / 2;
                let cInfo = refColors[this.colorIdx];
                if (!cInfo) return;

                let breathe = Math.sin(Date.now() / 300 + (this.r * 0.5)) * 0.03;
                let finalScale = (this.scale + breathe) * (isSelected ? 1.2 : 1);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(finalScale, finalScale);
                
                // Mobil performans için shadow sadece seçiliyken çizilir
                if (isSelected) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "white";
                }

                ctx.fillStyle = cInfo.base;
                ctx.beginPath();
                ctx.arc(0, 0, 24, 0, Math.PI * 2);
                ctx.fill();

                // Basit Yüz (Gözler)
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.beginPath();
                ctx.arc(-8, -4, 4, 0, Math.PI * 2);
                ctx.arc(8, -4, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // --- IZGARA MANTIĞI ---
        function createGrid() {
            grid = [];
            for (let r = 0; r < gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < gridSize; c++) grid[r][c] = new Candy(r, c, getSmartColor());
            }
            while (checkMatches().length > 0) {
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) grid[r][c].colorIdx = getSmartColor();
                }
            }
        }

        function checkMatches() {
            let matches = [];
            let visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!visited[r][c] && grid[r][c]) {
                        let color = grid[r][c].colorIdx;
                        let group = [];
                        let stack = [{ r, c }];
                        visited[r][c] = true;
                        while (stack.length > 0) {
                            let curr = stack.pop();
                            group.push(curr);
                            let neighbors = [{ r: curr.r + 1, c: curr.c }, { r: curr.r - 1, c: curr.c }, { r: curr.r, c: curr.c + 1 }, { r: curr.r, c: curr.c - 1 }];
                            for (let n of neighbors) {
                                if (n.r >= 0 && n.r < gridSize && n.c >= 0 && n.c < gridSize && !visited[n.r][n.c] && grid[n.r][n.c] && grid[n.r][n.c].colorIdx === color) {
                                    visited[n.r][n.c] = true; stack.push(n);
                                }
                            }
                        }
                        if (group.length >= 3) matches.push(group);
                    }
                }
            }
            return matches;
        }

        async function processBoard() {
            gameState = "PROCESSING";
            let chain = true;
            comboMultiplier = 0;
            while (chain) {
                let matches = checkMatches();
                if (matches.length === 0) { chain = false; break; }
                comboMultiplier++;
                if (comboMultiplier > 1) {
                    let comboEl = document.getElementById("comboValue");
                    comboEl.innerText = `COMBO X${comboMultiplier}!`;
                    comboEl.style.opacity = "1";
                }
                for (let group of matches) {
                    for (let pos of group) {
                        let c = grid[pos.r][pos.c];
                        if (c) {
                            createExplosion(c.x + cellSize/2, c.y + cellSize/2, refColors[c.colorIdx].base);
                            grid[pos.r][pos.c] = null;
                        }
                    }
                    score += group.length * 10 * comboMultiplier;
                    updateUI();
                    triggerVibration(50);
                }
                await new Promise(r => setTimeout(r, 400));
                await applyGravity();
                await new Promise(r => setTimeout(r, 600));
            }
            gameState = "IDLE";
            document.getElementById("comboValue").style.opacity = "0";
        }

        function applyGravity() {
            return new Promise(resolve => {
                for (let c = 0; c < gridSize; c++) {
                    let emptyRow = gridSize - 1;
                    for (let r = gridSize - 1; r >= 0; r--) {
                        if (grid[r][c]) {
                            let candy = grid[r][c];
                            grid[emptyRow][c] = candy;
                            if (emptyRow !== r) grid[r][c] = null;
                            candy.r = emptyRow; candy.targetY = emptyRow * cellSize;
                            emptyRow--;
                        }
                    }
                    for (let r = emptyRow; r >= 0; r--) {
                        grid[r][c] = new Candy(r, c, getSmartColor());
                        grid[r][c].y = -150 - (r * cellSize);
                        grid[r][c].targetY = r * cellSize;
                    }
                }
                resolve();
            });
        }

        function updateUI() {
            document.getElementById("scoreDisplay").innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("sanuCandy_Mobile_Best", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1.0, color
                });
            }
        }

        // --- ANA DÖNGÜ ---
        function mainLoop() {
            ctx.fillStyle = "#0a0a19";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    ctx.fillStyle = "rgba(255,255,255,0.03)";
                    ctx.fillRect(c*cellSize+4, r*cellSize+4, cellSize-8, cellSize-8);
                    if (grid[r][c]) {
                        grid[r][c].update();
                        grid[r][c].draw(selectedCandy && selectedCandy.r === r && selectedCandy.c === c);
                    }
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(mainLoop);
        }

        function animateBg() {
            bgCtx.fillStyle = "#0f2027";
            bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
            requestAnimationFrame(animateBg);
        }

        // --- KONTROLLER ---
        canvas.addEventListener("pointerdown", e => {
            if (gameState !== "IDLE") return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            startX = (e.clientX - rect.left) * scale;
            startY = (e.clientY - rect.top) * scale;
            let c = Math.floor(startX / cellSize), r = Math.floor(startY / cellSize);
            if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                isDragging = true;
                if (!selectedCandy) { selectedCandy = { r, c }; triggerVibration(30); }
                else {
                    if (Math.abs(selectedCandy.r - r) + Math.abs(selectedCandy.c - c) === 1) {
                        handleSwap(selectedCandy.r, selectedCandy.c, r, c);
                        selectedCandy = null;
                    } else selectedCandy = { r, c };
                }
            }
        });

        canvas.addEventListener("pointermove", e => {
            if (!isDragging || gameState !== "IDLE" || !selectedCandy) return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            let dx = (e.clientX - rect.left) * scale - startX;
            let dy = (e.clientY - rect.top) * scale - startY;
            if (Math.abs(dx) > cellSize * 0.4 || Math.abs(dy) > cellSize * 0.4) {
                isDragging = false;
                let tr = selectedCandy.r, tc = selectedCandy.c;
                if (Math.abs(dx) > Math.abs(dy)) tc += (dx > 0 ? 1 : -1);
                else tr += (dy > 0 ? 1 : -1);
                if (tr >= 0 && tr < gridSize && tc >= 0 && tc < gridSize) handleSwap(selectedCandy.r, selectedCandy.c, tr, tc);
                selectedCandy = null;
            }
        });

        function handleSwap(r1, c1, r2, c2) {
            gameState = "SWAPPING";
            let c1_obj = grid[r1][c1], c2_obj = grid[r2][c2];
            grid[r1][c1] = c2_obj; grid[r2][c2] = c1_obj;
            c1_obj.r = r2; c1_obj.c = c2; c1_obj.targetY = r2 * cellSize;
            c2_obj.r = r1; c2_obj.c = c1; c2_obj.targetY = r1 * cellSize;
            setTimeout(() => {
                if (checkMatches().length > 0) processBoard();
                else {
                    gameState = "REVERTING";
                    grid[r1][c1] = c1_obj; grid[r2][c2] = c2_obj;
                    c1_obj.r = r1; c1_obj.targetY = r1 * cellSize;
                    c2_obj.r = r2; c2_obj.c = r2 * cellSize;
                    setTimeout(() => gameState = "IDLE", 300);
                }
            }, 350);
        }

        function toggleHelp() { document.getElementById("helpModal").style.display = (document.getElementById("helpModal").style.display === "block" ? "none" : "block"); }
        function toggleVibration() { isVibrationEnabled = !isVibrationEnabled; triggerVibration(60); }
        init();
    </script>
</body>
</html>
