<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanu Candy - Ultra Fluid Engine</title>
    <style>
        /* ==========================================================================
           1. CSS TASARIM - GÖRSEL KALİTE (HİÇBİR SIKIŞTIRMA YOKTUR)
           ========================================================================== */
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #050508; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Derin Uzay Arka Planı */
        #universeCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
        }

        /* Oyun Alanı Konteynırı */
        #gameArea { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Gelişmiş Kanvas Efektleri */
        #gameCanvas { 
            background: rgba(10, 10, 25, 0.85); 
            box-shadow: 0 0 100px rgba(255, 64, 129, 0.3), inset 0 0 40px rgba(255, 255, 255, 0.03); 
            border: 5px solid #FF4081; 
            border-radius: 45px; 
            max-width: 95vmin; 
            max-height: 95vmin; 
            cursor: pointer; 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            touch-action: none; 
        }

        /* ==========================================================================
           2. ARAYÜZ (UI) - SKOR VE KONTROLLER
           ========================================================================== */
        
        .top-ui { 
            position: absolute; 
            top: 35px; 
            left: 20px; 
            right: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            z-index: 10; 
            pointer-events: none; 
        }

        .score-board { 
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-weight: 900; 
            text-shadow: 4px 4px 0px rgba(0,0,0,1); 
            pointer-events: auto; 
            color: #FFF; 
            border: 4px solid #FF4081; 
            padding: 15px 35px; 
            border-radius: 25px; 
            background: rgba(255, 64, 129, 0.2); 
            backdrop-filter: blur(15px); 
            min-width: 150px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .high-score-text {
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .current-score-text {
            font-size: 40px;
            letter-spacing: 5px;
            line-height: 1;
        }

        .combo-text {
            font-size: 16px;
            color: #00E5FF;
            text-align: center;
            height: 20px;
            margin-top: 5px;
            opacity: 0;
            transition: 0.3s;
        }

        .controls { 
            display: flex; 
            gap: 20px; 
            pointer-events: auto; 
        }

        .icon-btn { 
            background: rgba(255, 64, 129, 0.2); 
            border: 3px solid #FF4081; 
            color: #FFF; 
            width: 65px; 
            height: 65px; 
            border-radius: 22px; 
            font-size: 30px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .icon-btn:hover { 
            background: #FF4081; 
            transform: scale(1.15) rotate(5deg); 
            box-shadow: 0 0 30px #FF4081; 
        }

        /* ==========================================================================
           3. MODAL SİSTEMİ
           ========================================================================== */
        
        #helpModal { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(10, 15, 30, 0.98); 
            border: 6px solid #FF4081; 
            padding: 50px; 
            border-radius: 50px; 
            text-align: left; 
            z-index: 100; 
            max-width: 85%; 
            width: 550px; 
            box-shadow: 0 0 120px rgba(255, 64, 129, 0.8); 
        }

        #helpModal h2 {
            color: #FF4081;
            text-align: center;
            font-size: 36px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .action-btn { 
            background: linear-gradient(135deg, #FF4081 0%, #E91E63 100%);
            color: white; 
            border: none; 
            padding: 22px 40px; 
            font-size: 24px; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-weight: 900; 
            width: 100%; 
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <canvas id="universeCanvas"></canvas>

    <div id="gameArea">
        <div class="top-ui">
            <div class="score-board">
                <div class="high-score-text">MAX: <span id="highScore">0</span></div>
                <div class="current-score-text" id="scoreValue">0</div>
                <div class="combo-text" id="comboValue">COMBO X2</div>
            </div>
            
            <div class="controls">
                <a href="index.html" class="icon-btn">🏠</a>
                <button class="icon-btn" id="vibBtn" onclick="toggleVibration()">📳</button>
                <button class="icon-btn" onclick="toggleHelp()">?</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="560" height="560"></canvas>

        <div id="helpModal">
            <h2>FLUID CANDY</h2>
            <p>🌟 <b>Akıcı Fizik:</b> Şekerler gerçek bir ağırlıkla düşer ve birleşir.</p>
            <p>🧶 <b>Yumak Birleşme:</b> En az 3 bitişik şekeri patlatarak pürüzsüz kombolar yap.</p>
            <p>💣 <b>Özel Güçler:</b> 4 ve 5'li eşleşmelerde devasa patlayıcılar oluştur.</p>
            <button class="action-btn" onclick="toggleHelp()">BAŞLAT</button>
        </div>
    </div>

    <script>
        /* ==========================================================================
           4. JAVASCRIPT MOTORU - ULTRA FLUID SÜRÜM
           ========================================================================== */

        // --- GLOBAL MOTOR DEĞİŞKENLERİ ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const bgCanvas = document.getElementById('universeCanvas');
        const bgCtx = bgCanvas.getContext('2d');

        const gridSize = 8;
        const cellSize = 70;
        
        let score = 0;
        let highScore = localStorage.getItem("sanuCandy_Fluid_Best") || 0;
        let isVibrationEnabled = true;
        let gameState = "IDLE"; 
        let comboMultiplier = 1;
        
        let grid = [];
        let particles = [];
        let selectedCandy = null;
        let isDragging = false;
        let startX, startY;
        let animProgress = 0;

        // image_6.png Renk ve Şekil Standartları
        const refColors = [
            { id: 0, base: "#FF1744", light: "#FF8A80", type: "spiralJelly" }, // Kırmızı
            { id: 1, base: "#00E676", light: "#B9F6CA", type: "swirlGreen" },  // Yeşil
            { id: 2, base: "#2962FF", light: "#82B1FF", type: "jelBean" },     // Mavi
            { id: 3, base: "#FFEA00", light: "#FFFF8D", type: "star" },        // Sarı
            { id: 4, base: "#FF6D00", light: "#FFD180", type: "triangle" },    // Turuncu
            { id: 5, base: "#D500F9", light: "#EA80FC", type: "heart" }        // Mor
        ];

        // ==========================================================================
        // 5. ÇİZİM VE FİZİK SINIFI (CANDY)
        // ==========================================================================

        class Candy {
            constructor(r, c, colorIdx, special = "normal") {
                this.r = r;
                this.c = c;
                this.colorIdx = colorIdx;
                
                // Animasyon Koordinatları
                this.x = c * cellSize;
                this.y = r * cellSize;
                this.targetY = r * cellSize;
                
                // Fiziksel Değerler
                this.velY = 0;
                this.gravity = 0.5;
                this.bounce = 0.3;
                
                // Görsel Değerler
                this.scale = 1;
                this.alpha = 1;
                this.isSpecial = special;
                this.isMatched = false;
            }

            // PÜRÜZSÜZ DÜŞME ANİMASYONU (Gelişmiş Fizik)
            update() {
                if (this.y < this.targetY) {
                    this.velY += this.gravity;
                    this.y += this.velY;
                    
                    if (this.y >= this.targetY) {
                        this.y = this.targetY;
                        // Hafif sekme efekti (Juicy Effect)
                        if (this.velY > 2) {
                            this.velY *= -this.bounce;
                        } else {
                            this.velY = 0;
                        }
                    }
                } else if (this.y > this.targetY && gameState !== "SWAPPING") {
                    // Yukarı çıkması gerekiyorsa (Nadir durumlar)
                    this.y -= (this.y - this.targetY) * 0.1;
                }

                // IDLE durumunda X ekseni sabitlemesi
                if (gameState === "IDLE") {
                    this.x = this.c * cellSize;
                }
            }

            draw(isSelected) {
                let cx = this.x + cellSize / 2;
                let cy = this.y + cellSize / 2;
                let cInfo = refColors[this.colorIdx];
                if (!cInfo) return;

                let time = Date.now();
                // Organik nefes alma ve seçilme şişmesi
                let breathe = Math.sin(time / 200 + (this.r * 0.5) + (this.c * 0.5)) * 0.03;
                let finalScale = (this.scale + breathe) * (isSelected ? 1.3 : 1);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(finalScale, finalScale);

                // Parlama ve Gölge
                ctx.shadowBlur = isSelected ? 30 : 15;
                ctx.shadowColor = isSelected ? "white" : "rgba(0,0,0,0.6)";

                // Gradient Dolgu
                let grad = ctx.createRadialGradient(-10, -10, 2, 0, 0, 25);
                grad.addColorStop(0, cInfo.light);
                grad.addColorStop(1, cInfo.base);
                ctx.fillStyle = grad;

                this.renderShape(cInfo.type, 26);

                // Gözler ve Sevimli Yüz
                this.renderFace();

                ctx.restore();
            }

            renderShape(type, r) {
                ctx.beginPath();
                if (type === "spiralJelly" || type === "swirlGreen") {
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.fill();
                    // Detay çizgileri
                    ctx.strokeStyle = "rgba(255,255,255,0.4)";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for(let i=0; i<12; i++) {
                        let a = 0.1 * i;
                        let sx = (1 + 2 * a) * Math.cos(a * 8);
                        let sy = (1 + 2 * a) * Math.sin(a * 8);
                        ctx.lineTo(sx, sy);
                    }
                    ctx.stroke();
                } else if (type === "jelBean") {
                    ctx.ellipse(0, 0, r, r * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (type === "star") {
                    for(let i=0; i<10; i++) {
                        let rad = (i % 2 === 0) ? r : r/2.2;
                        ctx.lineTo(Math.cos(i * Math.PI / 5 - Math.PI / 2) * rad, Math.sin(i * Math.PI / 5 - Math.PI / 2) * rad);
                    }
                } else if (type === "triangle") {
                    ctx.moveTo(0, -r); ctx.lineTo(r, r); ctx.lineTo(-r, r);
                } else if (type === "heart") {
                    ctx.moveTo(0, r/1.5); 
                    ctx.bezierCurveTo(-r, -r/2, -r/2, -r, 0, -r/3);
                    ctx.bezierCurveTo(r/2, -r, r, -r/2, 0, r/1.5);
                }
                ctx.closePath();
                ctx.fill();
            }

            renderFace() {
                // Gözler
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.beginPath();
                ctx.arc(-8, -4, 4.5, 0, Math.PI * 2);
                ctx.arc(8, -4, 4.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Göz Parlaması
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(-9, -5.5, 1.8, 0, Math.PI * 2);
                ctx.arc(7, -5.5, 1.8, 0, Math.PI * 2);
                ctx.fill();

                // Ağız
                ctx.strokeStyle = "rgba(0,0,0,0.6)";
                ctx.lineWidth = 2.5;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.arc(0, 3, 7, 0.3, Math.PI - 0.3);
                ctx.stroke();
            }
        }

        // ==========================================================================
        // 6. IZGARA YÖNETİMİ VE BFS YUMAK ALGORİTMASI
        // ==========================================================================

        function createGrid() {
            grid = [];
            for (let r = 0; r < gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < gridSize; c++) {
                    grid[r][c] = new Candy(r, c, getSmartColor());
                }
            }
            // Başlangıç eşleşmelerini temizle
            let safety = 0;
            while (checkMatches().length > 0 && safety < 100) {
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        grid[r][c].colorIdx = getSmartColor();
                    }
                }
                safety++;
            }
        }

        function getSmartColor() {
            let max = score > 2000 ? 6 : (score > 800 ? 5 : 4);
            return Math.floor(Math.random() * max);
        }

        // BFS ile Yumak Bulma
        function checkMatches() {
            let matches = [];
            let visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!visited[r][c] && grid[r][c]) {
                        let color = grid[r][c].colorIdx;
                        let group = [];
                        let queue = [{ r, c }];
                        visited[r][c] = true;

                        while (queue.length > 0) {
                            let curr = queue.shift();
                            group.push(curr);
                            
                            let neighbors = [
                                { r: curr.r + 1, c: curr.c }, { r: curr.r - 1, c: curr.c },
                                { r: curr.r, c: curr.c + 1 }, { r: curr.r, c: curr.c - 1 }
                            ];

                            for (let n of neighbors) {
                                if (n.r >= 0 && n.r < gridSize && n.c >= 0 && n.c < gridSize &&
                                    !visited[n.r][n.c] && grid[n.r][n.c] && grid[n.r][n.c].colorIdx === color) {
                                    visited[n.r][n.c] = true;
                                    queue.push(n);
                                }
                            }
                        }

                        if (group.length >= 3) matches.push(group);
                    }
                }
            }
            return matches;
        }

        // ==========================================================================
        // 7. ZENGİN PARTİKÜL VE EFEKT SİSTEMİ
        // ==========================================================================

        function createRichExplosion(x, y, color) {
            // Ana Patlama Parçacıkları
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 22,
                    vy: (Math.random() - 0.5) * 22,
                    ay: 0.4, // Yerçekimi
                    life: 1.0,
                    size: Math.random() * 7 + 4,
                    color: color,
                    type: "spark"
                });
            }
            // Duman Efekti
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    ay: -0.1, // Yukarı süzülür
                    life: 0.8,
                    size: Math.random() * 20 + 10,
                    color: "rgba(255,255,255,0.1)",
                    type: "smoke"
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.ay;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                if (p.type === "spark") {
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                } else {
                    ctx.arc(p.x, p.y, p.size * (1.5 - p.life), 0, Math.PI * 2); // Duman büyür
                }
                ctx.fill();
                ctx.restore();
            }
        }

        // ==========================================================================
        // 8. OYUN DÖNGÜSÜ VE MANTIKSEL İŞLEMLER
        // ==========================================================================

        async function processBoard() {
            gameState = "PROCESSING";
            let chain = true;
            comboMultiplier = 0;

            while (chain) {
                let matches = checkMatches();
                if (matches.length === 0) { chain = false; break; }

                comboMultiplier++;
                if (comboMultiplier > 1) {
                    let comboEl = document.getElementById("comboValue");
                    comboEl.innerText = `COMBO X${comboMultiplier}!`;
                    comboEl.style.opacity = "1";
                }

                // Patlatma İşlemi
                for (let group of matches) {
                    for (let pos of group) {
                        let c = grid[pos.r][pos.c];
                        if (c) {
                            createRichExplosion(c.x + cellSize/2, c.y + cellSize/2, refColors[c.colorIdx].base);
                            grid[pos.r][pos.c] = null;
                        }
                    }
                    score += group.length * 20 * comboMultiplier;
                    updateUI();
                    triggerVibration(100);
                }

                await new Promise(r => setTimeout(r, 500));
                
                // Düşürme İşlemi
                await applyGravity();
                await new Promise(r => setTimeout(r, 700)); // Düşme animasyonunun bitmesi için süre
            }
            
            gameState = "IDLE";
            document.getElementById("comboValue").style.opacity = "0";
        }

        function applyGravity() {
            return new Promise(resolve => {
                for (let c = 0; c < gridSize; c++) {
                    let emptyRow = gridSize - 1;
                    for (let r = gridSize - 1; r >= 0; r--) {
                        if (grid[r][c]) {
                            let candy = grid[r][c];
                            grid[emptyRow][c] = candy;
                            if (emptyRow !== r) grid[r][c] = null;
                            candy.r = emptyRow;
                            candy.targetY = emptyRow * cellSize;
                            emptyRow--;
                        }
                    }
                    // Üstten yeni şekerleri gönder
                    for (let r = emptyRow; r >= 0; r--) {
                        grid[r][c] = new Candy(r, c, getSmartColor());
                        grid[r][c].y = -200 - (r * cellSize); // Ekranın çok dışından düşsünler
                        grid[r][c].targetY = r * cellSize;
                    }
                }
                resolve();
            });
        }

        function updateUI() {
            document.getElementById("scoreValue").innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("sanuCandy_Fluid_Best", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        // ==========================================================================
        // 9. KONTROLLER VE ETKİLEŞİM
        // ==========================================================================

        function handleSwap(r1, c1, r2, c2) {
            if (gameState !== "IDLE") return;
            
            gameState = "SWAPPING";
            let c1_obj = grid[r1][c1];
            let c2_obj = grid[r2][c2];

            grid[r1][c1] = c2_obj;
            grid[r2][c2] = c1_obj;
            
            c1_obj.r = r2; c1_obj.c = c2; c1_obj.targetY = r2 * cellSize;
            c2_obj.r = r1; c2_obj.c = c1; c2_obj.targetY = r1 * cellSize;

            setTimeout(() => {
                if (checkMatches().length > 0) {
                    processBoard();
                } else {
                    // GERİ SEKME (Revert)
                    gameState = "REVERTING";
                    triggerVibration(40);
                    grid[r1][c1] = c1_obj;
                    grid[r2][c2] = c2_obj;
                    c1_obj.r = r1; c1_obj.c = c1; c1_obj.targetY = r1 * cellSize;
                    c2_obj.r = r2; c2_obj.c = c2; c2_obj.targetY = r2 * cellSize;
                    setTimeout(() => gameState = "IDLE", 350);
                }
            }, 400);
        }

        canvas.addEventListener("pointerdown", e => {
            if (gameState !== "IDLE") return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            startX = (e.clientX - rect.left) * scale;
            startY = (e.clientY - rect.top) * scale;
            
            let c = Math.floor(startX / cellSize);
            let r = Math.floor(startY / cellSize);
            
            if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                isDragging = true;
                if (!selectedCandy) {
                    selectedCandy = { r, c };
                    triggerVibration(25);
                } else {
                    let dr = Math.abs(selectedCandy.r - r);
                    let dc = Math.abs(selectedCandy.c - c);
                    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                        handleSwap(selectedCandy.r, selectedCandy.c, r, c);
                        selectedCandy = null;
                    } else {
                        selectedCandy = { r, c };
                    }
                }
            }
        });

        canvas.addEventListener("pointermove", e => {
            if (!isDragging || gameState !== "IDLE" || !selectedCandy) return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            let mx = (e.clientX - rect.left) * scale;
            let my = (e.clientY - rect.top) * scale;
            
            let dx = mx - startX;
            let dy = my - startY;

            if (Math.abs(dx) > cellSize * 0.4 || Math.abs(dy) > cellSize * 0.4) {
                isDragging = false;
                let tr = selectedCandy.r;
                let tc = selectedCandy.c;

                if (Math.abs(dx) > Math.abs(dy)) tc += (dx > 0 ? 1 : -1);
                else tr += (dy > 0 ? 1 : -1);

                if (tr >= 0 && tr < gridSize && tc >= 0 && tc < gridSize) {
                    handleSwap(selectedCandy.r, selectedCandy.c, tr, tc);
                }
                selectedCandy = null;
            }
        });

        canvas.addEventListener("pointerup", () => isDragging = false);

        // ==========================================================================
        // 10. ANA ANİMASYON DÖNGÜSÜ
        // ==========================================================================

        function mainLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Yuvaları Çiz
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.1)";
                    ctx.beginPath();
                    ctx.roundRect(c * cellSize + 4, r * cellSize + 4, cellSize - 8, cellSize - 8, 12);
                    ctx.fill();
                    
                    if (grid[r][c]) {
                        grid[r][c].update();
                        let isChosen = (selectedCandy && selectedCandy.r === r && selectedCandy.c === c);
                        grid[r][c].draw(isChosen);
                    }
                }
            }

            updateParticles();
            requestAnimationFrame(mainLoop);
        }

        // Arka Plan Işıltıları
        function animateBg() {
            bgCtx.clearRect(0,0,bgCanvas.width, bgCanvas.height);
            let grad = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
            grad.addColorStop(0, "#0f2027"); grad.addColorStop(1, "#203a43");
            bgCtx.fillStyle = grad; bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
            requestAnimationFrame(animateBg);
        }

        function toggleHelp() {
            const m = document.getElementById("helpModal");
            m.style.display = m.style.display === "block" ? "none" : "block";
        }

        function toggleVibration() {
            isVibrationEnabled = !isVibrationEnabled;
            const btn = document.getElementById("vibBtn");
            btn.innerText = isVibrationEnabled ? "📳" : "📴";
            btn.style.color = isVibrationEnabled ? "#FFF" : "#888";
            triggerVibration(60);
        }

        // BAŞLAT
        init();

    </script>
</body>
</html>
