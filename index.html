<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Sanu Gaem Company | Efsanevi Piksel Dünyası</title>
    
    <style>
        /* ==========================================================================
           1. HIGH-END PIXEL ART CSS VE TEMA (EKSİKSİZ)
           ========================================================================== */
        
        :root {
            --sky-day-1: #4facfe; --sky-day-2: #00f2fe;
            --sky-night-1: #050508; --sky-night-2: #151525;
            --accent-pink: #FF4081;
            --accent-green: #4CAF50;
            --accent-blue: #2196F3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
        }

        #pixelSkyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            image-rendering: pixelated;
        }

        /* ==========================================
           2. BAŞLIK VE LOGO TASARIMI
           ========================================== */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        .logo {
            font-size: clamp(45px, 10vw, 80px);
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .logo span { color: var(--accent-pink); }

        .motto {
            font-size: clamp(14px, 4vw, 18px);
            opacity: 0.9;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* ==========================================
           3. CIHAZA ÖZEL OYUN KARTI (PC/MOBILE)
           ========================================== */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .game-grid {
            display: grid;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 1025px) {
            .card {
                flex-direction: row !important;
                text-align: left !important;
                justify-content: space-between !important;
                padding: 40px !important;
            }
            .card .card-content { display: flex; flex-direction: column; align-items: flex-start; }
            .card .icon-container { margin-right: 30px; margin-bottom: 0 !important; }
            .badge-container { justify-content: flex-start !important; }
        }

        .card {
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 35px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: var(--accent-green);
            box-shadow: 0 30px 60px rgba(76, 175, 80, 0.4);
        }

        .icon-container {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            border: 4px solid rgba(255,255,255,0.1);
            background: #000;
        }

        .game-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .card-content { flex: 1; }

        .title { font-size: 32px; font-weight: 800; margin-bottom: 12px; }

        .desc { font-size: 16px; opacity: 0.8; line-height: 1.7; max-width: 550px; }

        .badge-container {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .badge {
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge:hover { transform: scale(1.1); filter: brightness(1.2); }

        .badge.web { background: var(--accent-green); box-shadow: 0 0 15px var(--accent-green); }
        .badge.play { background: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }
        .badge.app { background: #555; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* ==========================================
           4. FOOTER VE DURUM ÇUBUĞU
           ========================================== */
        footer {
            padding: 50px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            font-size: 14px;
            opacity: 0.7;
            margin-top: auto;
        }

        #system-status {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(0,0,0,0.6);
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body id="body">

    <canvas id="pixelSkyCanvas"></canvas>

    <header>
        <div class="logo">SANU<span>GAEM</span></div>
        <div class="motto">Community that supports education.</div>
    </header>

    <div class="main-container">
        <div class="game-grid">
            
            <div class="card">
                <div class="icon-container">
                    <img src="phobia.jpeg" alt="👁️" class="game-icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon" style="display:none; font-size: 60px;">👁️</div>
                </div>
                
                <div class="card-content">
                    <div class="title">Phobia</div>
                    <div class="desc">Korkularınla yüzleşmeye hazır mısın? Efsanevi WebGL gerilim deneyimi. Sadece web versiyonu aktiftir.</div>
                    
                    <div class="badge-container">
                        <a href="https://phobia-official.netlify.app" class="badge web">WEB VERSION</a>
                        <a href="https://play.google.com/store/apps/details?id=com.SanuGaemCompany.Phobia" target="_blank" class="badge play">PLAY STORE</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="system-status">Sistem Yükleniyor...</div>

    <footer>
        &copy; 2026 Sanu Game Company. Tüm Hakları Saklıdır.<br>
        Developed by SanuGaem.
    </footer>

    <script>
        /* ==========================================================================
           5. HIGH-END PIXEL ART GÖKYÜZÜ MOTORU
           ========================================================================== */
        const canvas = document.getElementById("pixelSkyCanvas");
        const ctx = canvas.getContext("2d");
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const hour = new Date().getHours();
        const isDay = hour >= 6 && hour < 18;

        const stars = [];
        const meteors = [];
        const clouds = [];

        if(isDay) {
            for(let i=0; i<8; i++) {
                clouds.push({ x: Math.random()*width, y: Math.random()*height/2, w: Math.random()*60+40, h: Math.random()*20+15, speed: Math.random()*0.3+0.1 });
            }
        } else {
            for(let i=0; i<120; i++) {
                stars.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*2+1, a: Math.random()});
            }
        }

        function pBlock(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(Math.floor(x), Math.floor(y), w, h); }

        function drawPixelSky() {
            ctx.clearRect(0,0,width,height);
            let grd = ctx.createLinearGradient(0, 0, 0, height);
            if(isDay) {
                grd.addColorStop(0, "#4facfe"); grd.addColorStop(1, "#00f2fe");
            } else {
                grd.addColorStop(0, "#050508"); grd.addColorStop(1, "#151525");
            }
            ctx.fillStyle = grd;
            ctx.fillRect(0,0,width,height);

            if(isDay) {
                pBlock(width-120, 100, 50, 50, "#FFD700");
                pBlock(width-130, 110, 70, 30, "#FFD700");
                pBlock(width-115, 105, 40, 40, "#FFF");
                clouds.forEach(c => {
                    pBlock(c.x, c.y, c.w, c.h, "rgba(255,255,255,0.7)");
                    pBlock(c.x+10, c.y-10, c.w-20, 10, "rgba(255,255,255,0.7)");
                    c.x += c.speed;
                    if(c.x > width + 100) c.x = -100;
                });
            } else {
                pBlock(width-120, 100, 40, 60, "#DDD");
                pBlock(width-100, 115, 10, 10, "#AAA");
                stars.forEach(s => {
                    s.a += 0.03;
                    ctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(s.a))})`;
                    pBlock(s.x, s.y, s.s, s.s, ctx.fillStyle);
                });
                if(Math.random() < 0.03) meteors.push({x: Math.random()*width, y: -50, s: Math.random()*6+4});
                meteors.forEach((m, i) => {
                    pBlock(m.x, m.y, 10, 10, "#FF5252");
                    pBlock(m.x+8, m.y-8, 6, 6, "#FF9800");
                    m.x -= m.s; m.y += m.s;
                    if(m.y > height + 50) meteors.splice(i, 1);
                });
            }
            requestAnimationFrame(drawPixelSky);
        }

        function detectDeviceAndSystem() {
            const ua = navigator.userAgent;
            const status = document.getElementById("system-status");
            let device = "PC / Desktop";
            let os = "Web Browser";
            if (/Mobile|Android|iP(hone|od)/i.test(ua)) { device = "Mobile"; }
            if (/Android/i.test(ua)) { os = "Android OS"; }
            else if (/iPhone|iPad|iPod/i.test(ua)) { os = "iOS System"; }
            status.innerHTML = `Cihaz: ${device} | OS: ${os} | Mod: ${isDay ? 'Day' : 'Night'}`;
        }

        detectDeviceAndSystem();
        drawPixelSky();
    </script>
</body>
</html>
