<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Run - Sanu Game Company</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #08080a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: radial-gradient(circle, #1a1a2e 0%, #0a0a12 100%); border-bottom: 5px solid #4CAF50; box-shadow: 0 10px 40px rgba(76, 175, 80, 0.3); border-radius: 10px 10px 0 0; }
        #ui { position: absolute; top: 20px; width: 800px; display: flex; justify-content: space-between; font-size: 26px; font-weight: bold; text-shadow: 0 0 10px #4CAF50; }
        #gameOverScreen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 15, 19, 0.96); padding: 50px; border-radius: 20px; border: 3px solid #4CAF50; text-align: center; box-shadow: 0 0 50px rgba(76, 175, 80, 0.6); z-index: 100; }
        button { background-color: #4CAF50; color: white; border: none; padding: 18px 35px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 25px; transition: 0.3s; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        button:hover { background-color: #45a049; transform: scale(1.05); box-shadow: 0 0 25px rgba(76, 175, 80, 0.8); }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 16px; }
        .back-link:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Skor: <span id="score">0</span></div>
        <div>En Yüksek: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="gameOverScreen">
        <h1 style="color: #FF5722; margin-top: 0; font-size: 40px; letter-spacing: 2px;">KOZMİK ÇARPIŞMA!</h1>
        <p style="font-size: 24px;">Skorun: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Tekrar Atıl (Space)</button>
        <a href="index.html" class="back-link">← Üsse Dön (Ana Sayfa)</a>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let frames = 0; let score = 0; let highScore = localStorage.getItem("sanuCosmicScore") || 0; let gameActive = true; let gameSpeed = 6;
        document.getElementById("highScore").innerText = highScore;

        // --- Arka Plan Objeleri (Kodlarla Çizim) ---
        const stars = []; const planets = []; const ships = []; const jets = [];
        for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * 800, y: Math.random() * 400, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1 });
        planets.push({ x: 900, y: 80, r: 40, color: "#4B0082", speed: 0.3 }, { x: 1200, y: 250, r: 25, color: "#FFD700", speed: 0.2 });
        ships.push({ x: 850, y: 150, w: 60, h: 20, color: "#C0C0C0", speed: 1.5 });
        jets.push({ x: 950, y: 300, w: 40, h: 10, color: "#4169E1", speed: 2.5 });

        function drawBackground() {
            ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); s.x -= s.speed; if (s.x < 0) s.x = 800; });
            planets.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0; p.x -= p.speed; if (p.x + p.r < 0) p.x = 900; });
            ships.forEach(sh => { ctx.fillStyle = sh.color; ctx.fillRect(sh.x, sh.y, sh.w, sh.h); sh.x -= sh.speed; if (sh.x + sh.w < 0) sh.x = 850; });
            jets.forEach(j => { ctx.fillStyle = j.color; ctx.fillRect(j.x, j.y, j.w, j.h); j.x -= j.speed; if (j.x + j.w < 0) j.x = 950; });
        }

        // --- Oyun Mekanikleri ---
        const player = { x: 60, y: 300, width: 40, height: 40, dy: 0, gravity: 0.7, jumpPower: -13, grounded: false, draw: function() { ctx.fillStyle = "#4CAF50"; ctx.shadowBlur = 20; ctx.shadowColor = "#4CAF50"; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.shadowBlur = 0; }, update: function() { this.dy += this.gravity; this.y += this.dy; if (this.y + this.height >= 400) { this.y = 400 - this.height; this.dy = 0; this.grounded = true; } else { this.grounded = false; } }, jump: function() { if (this.grounded) this.dy = this.jumpPower; } };
        const obstacles = [];
        function handleObstacles() {
            if (frames % 90 === 0) { let obsH = Math.random() * 50 + 30; obstacles.push({ x: 800, y: 400 - obsH, w: 35, h: obsH }); }
            obstacles.forEach((obs, i) => { obs.x -= gameSpeed; ctx.fillStyle = "#FF5722"; ctx.shadowBlur = 10; ctx.shadowColor = "#FF5722"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.shadowBlur = 0; if (player.x < obs.x + obs.w && player.x + player.width > obs.x && player.y < obs.y + obs.h && player.y + player.height > obs.y) gameOver(); if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score += 10; document.getElementById("score").innerText = score; if (score % 60 === 0) gameSpeed += 0.6; } });
        }

        function gameOver() { gameActive = false; document.getElementById("gameOverScreen").style.display = "block"; document.getElementById("finalScore").innerText = score; if (score > highScore) { highScore = score; localStorage.setItem("sanuCosmicScore", highScore); document.getElementById("highScore").innerText = highScore; } }
        function resetGame() { obstacles.length = 0; score = 0; frames = 0; gameSpeed = 6; player.y = 300; document.getElementById("score").innerText = score; document.getElementById("gameOverScreen").style.display = "none"; gameActive = true; animate(); }
        window.addEventListener("keydown", e => { if (e.code === "Space" || e.code === "ArrowUp") { if (gameActive) player.jump(); else resetGame(); } });
        window.addEventListener("mousedown", () => { if (gameActive) player.jump(); });

        function animate() { if (!gameActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground(); player.update(); player.draw(); handleObstacles(); frames++; requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
