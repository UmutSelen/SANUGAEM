<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Run - Canlı Atmosfer Sürümü</title>
    <style>
        /* ==========================================
           1. MOBİL UYUMLU CSS
           ========================================== */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #05050a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none;
        }
        
        #gameArea { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        canvas { 
            background: #090a0f; 
            border: 3px solid #4CAF50; 
            border-radius: 15px; 
            max-width: 95vw; 
            max-height: 80vh; 
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }
        
        /* MOBİL UI */
        .top-ui { 
            position: absolute; 
            top: 15px; 
            left: 10px; 
            right: 10px; 
            display: flex; 
            justify-content: space-between; 
            z-index: 10; 
            pointer-events: none; 
        }
        
        .score-board { 
            font-size: 18px; 
            font-weight: bold; 
            pointer-events: auto; 
            background: rgba(0,0,0,0.6); 
            padding: 8px 12px; 
            border-radius: 12px; 
            border: 2px solid #4CAF50;
            display: flex;
            flex-direction: column;
        }

        .powerup-text { font-size: 12px; font-weight: bold; display: none; }
        
        .controls { display: flex; gap: 10px; pointer-events: auto; }
        
        .icon-btn { 
            background: rgba(0,0,0,0.6); 
            border: 2px solid #4CAF50; 
            color: #4CAF50; 
            width: 45px; 
            height: 45px; 
            border-radius: 10px; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-decoration: none;
        }

        /* MODALLAR */
        #helpModal, #gameOverScreen { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(10, 15, 20, 0.95); 
            border: 4px solid #4CAF50; 
            padding: 20px; 
            border-radius: 20px; 
            z-index: 100; 
            width: 300px; 
            text-align: center;
        }
        
        button.action-btn { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 10px; 
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div class="top-ui">
            <div class="score-board">
                <span>Skor: <span id="score">0</span></span>
                <span id="textTriple" class="powerup-text" style="color:#00E5FF">🚀 3X ZIPLA!</span>
                <span id="textShield" class="powerup-text" style="color:#00E676">🛡️ KALKAN!</span>
            </div>
            <div class="controls">
                <a href="index.html" class="icon-btn">🏠</a>
                <button class="icon-btn" onclick="toggleVibration()">📳</button>
                <button class="icon-btn" onclick="toggleHelp()">?</button>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="helpModal">
            <h2 style="color: #4CAF50;">NASIL OYNANIR?</h2>
            <p>Zıplamak için ekrana dokun.</p>
            <p>Gündüzleri kuşlara, geceleri meteorlara dikkat et!</p>
            <button class="action-btn" onclick="toggleHelp()">BAŞLA</button>
        </div>
        
        <div id="gameOverScreen">
            <h2 style="color: #FF5722;">OYUN BİTTİ!</h2>
            <p>Skorun: <strong id="finalScore">0</strong></p>
            <button class="action-btn" onclick="resetGame()">Yeniden Dene</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); 
        const ctx = canvas.getContext("2d");
        
        function resizeCanvas() { 
            const aspect = 800 / 400; 
            if(window.innerWidth / window.innerHeight < aspect) { 
                canvas.style.width = window.innerWidth * 0.95 + "px"; 
                canvas.style.height = (window.innerWidth * 0.95 / aspect) + "px"; 
            } else { 
                canvas.style.height = window.innerHeight * 0.7 + "px"; 
                canvas.style.width = (window.innerHeight * 0.7 * aspect) + "px"; 
            } 
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        // --- ZAMAN SİSTEMİ ---
        const hour = new Date().getHours();
        const isDay = hour >= 6 && hour < 18; // 06:00 - 18:00 arası gündüz

        let frames = 0, score = 0, gameActive = true, baseGameSpeed = 5; 
        let timers = { tripleJump: 0 }, hasShield = false, isVibrationEnabled = true;

        function pRect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(Math.floor(x), Math.floor(y), w, h); }

        // --- ATMOSFERİK OBJELER (Bulutlar, Yıldızlar, Kuşlar) ---
        const bgElements = [];
        for(let i=0; i<15; i++) {
            bgElements.push({
                x: Math.random()*800, 
                y: Math.random()*(isDay ? 150 : 300), 
                s: Math.random()*2+2, 
                speed: Math.random()*0.5+0.1
            });
        }

        function drawBackground() {
            // Gökyüzü rengi
            ctx.fillStyle = isDay ? "#4facfe" : "#090a0f";
            ctx.fillRect(0,0,800,400);

            bgElements.forEach(el => {
                if(isDay) {
                    // Bulut çizimi
                    pRect(el.x, el.y, 40, 15, "rgba(255,255,255,0.7)");
                    pRect(el.x+10, el.y-10, 20, 10, "rgba(255,255,255,0.7)");
                } else {
                    // Yıldız çizimi
                    pRect(el.x, el.y, el.s, el.s, "white");
                }
                el.x -= el.speed;
                if(el.x < -50) el.x = 850;
            });
        }

        // --- OYUNCU ---
        const player = {
            x: 80, y: 300, w: 35, h: 45, dy: 0, gravity: 0.6, jumpPower: -10, grounded: false, jumpCount: 0,
            draw: function() {
                let px = this.x; let py = this.y;
                if(hasShield) {
                    ctx.strokeStyle = "#00E676"; ctx.lineWidth = 2;
                    ctx.strokeRect(px-5, py-5, this.w+10, this.h+10);
                }
                // Basit Piksel Deve Kuşu
                pRect(px+10, py, 15, 30, "#E0E0E0"); // Boyun
                pRect(px, py+20, 25, 20, "#4CAF50"); // Gövde
                pRect(px+5, py+38, 4, 8, "#FF9800"); // Ayak 1
                pRect(px+15, py+38, 4, 8, "#FF9800"); // Ayak 2
            },
            update: function() {
                this.dy += this.gravity; this.y += this.dy;
                if(this.y + this.h >= 360) { this.y = 360 - this.h; this.dy = 0; this.grounded = true; this.jumpCount = 0; }
                else { this.grounded = false; }
            },
            jump: function() {
                let limit = timers.tripleJump > 0 ? 3 : 2;
                if(this.grounded || this.jumpCount < limit) { this.dy = this.jumpPower; this.jumpCount++; this.grounded = false; }
            }
        };

        // --- ENGELLER (Gece Meteor / Gündüz Kuş) ---
        const obstacles = [];
        function handleObstacles() {
            if(frames % 100 === 0) {
                let type = Math.random() > 0.7 ? 'air' : 'ground';
                let obs = { x: 850, y: type === 'air' ? 220 : 320, w: 30, h: 40, type: type };
                
                // Gündüz havadan kuş, gece havadan meteor gelir
                if(type === 'air' && !isDay) { // Gece Meteoru (Çapraz düşer)
                    obs.y = -50; obs.speedX = 6; obs.speedY = 4; obs.isMeteor = true;
                }
                obstacles.push(obs);
            }

            for(let i=obstacles.length-1; i>=0; i--) {
                let o = obstacles[i];
                if(o.isMeteor) {
                    o.x -= o.speedX; o.y += o.speedY;
                    pRect(o.x, o.y, 20, 20, "#FF5252"); // Kırmızı Meteor
                } else {
                    o.x -= baseGameSpeed;
                    if(o.type === 'air') {
                        // Kuş veya Uçan Engel
                        pRect(o.x, o.y, 30, 20, isDay ? "#FFF" : "#9C27B0");
                        if(isDay) pRect(o.x-5, o.y+5, 10, 5, "#FF9800"); // Kanat
                    } else {
                        pRect(o.x, o.y, o.w, o.h, "#B71C1C"); // Yer engeli
                    }
                }

                // Çarpışma
                if(player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y) {
                    if(hasShield) {
                        hasShield = false; document.getElementById("textShield").style.display="none"; obstacles.splice(i,1);
                    } else { gameActive = false; showGameOver(); }
                }
                if(o.x < -100 || o.y > 450) obstacles.splice(i, 1);
            }
        }

        // --- ANA DÖNGÜ ---
        function mainLoop() {
            if(!gameActive) return;
            drawBackground();
            pRect(0, 360, 800, 40, "#1c2833"); // Zemin
            
            player.update();
            player.draw();
            handleObstacles();

            if(frames % 300 === 0) {
                // Rastgele Güçlendirme
                if(Math.random() > 0.5) { hasShield = true; document.getElementById("textShield").style.display="block"; }
                else { timers.tripleJump = 300; document.getElementById("textTriple").style.display="block"; }
            }

            if(timers.tripleJump > 0) timers.tripleJump--;
            else document.getElementById("textTriple").style.display="none";

            frames++; score++;
            document.getElementById("score").innerText = Math.floor(score/10);
            requestAnimationFrame(mainLoop);
        }

        // --- KONTROLLER ---
        window.addEventListener("pointerdown", (e) => {
            if(e.target.tagName === "BUTTON" || e.target.tagName === "A") return;
            if(gameActive) player.jump();
        });

        function showGameOver() {
            document.getElementById("gameOverScreen").style.display = "block";
            document.getElementById("finalScore").innerText = Math.floor(score/10);
            if (isVibrationEnabled && navigator.vibrate) navigator.vibrate(200);
        }

        function resetGame() {
            obstacles.length = 0; score = 0; frames = 0; gameActive = true;
            timers.tripleJump = 0; hasShield = false;
            player.y = 300; player.dy = 0;
            document.getElementById("gameOverScreen").style.display = "none";
            requestAnimationFrame(mainLoop);
        }

        function toggleHelp() {
            const m = document.getElementById("helpModal");
            m.style.display = (m.style.display === "block" ? "none" : "block");
        }

        function toggleVibration() { isVibrationEnabled = !isVibrationEnabled; if(isVibrationEnabled && navigator.vibrate) navigator.vibrate(50); }

        requestAnimationFrame(mainLoop);
    </script>
</body>
</html>
